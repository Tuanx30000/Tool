<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DASHBOARD - TUANX3000</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41;
            --primary-dark: #008f25;
            --accent: #ff00aa;
            --bg-dark: #030303;
            --card-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; padding: 0; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
        }

        /* Hiệu ứng nền mờ ảo */
        .bg-glow {
            position: fixed;
            top: -10%; left: -10%; width: 50%; height: 50%;
            background: radial-gradient(circle, rgba(0, 255, 65, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .container { 
            position: relative; 
            z-index: 10; 
            width: 100%;
            max-width: 480px; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            padding: 20px;
        }
        
        /* Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }

        .inbox-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            width: 45px; height: 45px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; cursor: pointer;
            transition: 0.3s;
        }

        .balance-card {
            background: linear-gradient(135deg, #111 0%, #222 100%);
            border: 1px solid var(--primary);
            padding: 8px 16px;
            border-radius: 12px;
            display: flex; align-items: center; gap: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }
        .balance-card span { color: var(--primary); font-weight: 800; font-size: 15px; }

        .header-title { text-align: center; margin-bottom: 20px; }
        .header-title h1 { 
            margin: 0; font-size: 24px; font-weight: 800; 
            text-transform: uppercase; letter-spacing: 1px;
            background: linear-gradient(to bottom, #fff 40%, #777);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .notif-banner { 
            background: linear-gradient(90deg, rgba(255, 0, 170, 0.1), transparent); 
            border-left: 3px solid var(--accent);
            color: var(--accent); 
            padding: 12px; border-radius: 8px; 
            margin-bottom: 20px; font-size: 12px; font-weight: bold; 
            text-align: center; text-decoration: none;
            display: block; animation: pulse 2s infinite;
        }

        /* Game Grid */
        .game-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 12px; 
            overflow-y: auto;
            padding-bottom: 100px;
        }
        .game-card { 
            background: var(--card-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            padding: 10px; 
            text-align: center; 
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .game-card:active { transform: scale(0.9); background: rgba(255,255,255,0.1); }
        
        .game-thumb { 
            aspect-ratio: 1/1;
            background: #000; border-radius: 14px; 
            margin-bottom: 10px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        .game-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .game-card span { font-weight: 700; font-size: 11px; color: #fff; opacity: 0.9; }

        /* Bottom Menu */
        .bottom-bar { 
            position: absolute; bottom: 20px; left: 20px; right: 20px; 
            background: rgba(20, 20, 20, 0.9); 
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            display: flex; padding: 8px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .menu-btn { 
            flex: 1; padding: 12px; border: none; background: transparent;
            color: #888; font-weight: bold; cursor: pointer; 
            font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px;
            transition: 0.3s;
        }
        .menu-btn.active { color: var(--primary); }
        .menu-btn i { font-size: 18px; }

        /* Key Input Screen */
        .key-box {
            text-align: center;
            animation: slideUp 0.4s ease;
        }
        .key-input-wrap {
            position: relative; margin: 30px 0;
        }
        .key-input-wrap input {
            width: 100%; padding: 20px; background: #111; 
            border: 2px solid #222; border-radius: 18px; 
            color: var(--primary); font-size: 22px; font-weight: 800; 
            text-align: center; outline: none; letter-spacing: 2px;
        }
        .key-input-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0,255,65,0.2); }

        .btn-main {
            background: var(--primary); color: #000;
            border: none; padding: 18px; border-radius: 18px;
            width: 100%; font-weight: 800; font-size: 16px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,255,65,0.3);
        }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-overlay.active { display: flex; }
        .modal-box { 
            background: #111; border: 1px solid var(--glass-border); 
            border-radius: 30px; padding: 30px; width: 90%; max-width: 400px;
        }
        .pkg-item {
            background: #1a1a1a; padding: 15px; border-radius: 15px;
            margin-bottom: 10px; display: flex; justify-content: space-between;
            border: 1px solid transparent; transition: 0.3s;
        }
        .pkg-item.selected { border-color: var(--primary); background: rgba(0,255,65,0.05); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="top-nav">
            <div class="inbox-btn" onclick="showInboxModal()">✉️</div>
            <div class="balance-card">
                <span>💰 <span id="balance-amount">0</span></span>
            </div>
            <div class="inbox-btn" onclick="goToHoso()">👤</div>
        </div>

        <div class="header-title">
            <h1 id="main-title">GAME TOOLS</h1>
        </div>

        <a class="notif-banner" href="https://t.me/tuanx3000">
            📢 THÔNG BÁO: MUA KEY IB TUANX3000
        </a>

        <div id="game-screen">
            <div class="game-grid">
                <div class="game-card" onclick="openKey('SUNWIN', 'toolsunwin.html')">
                    <div class="game-thumb"><img src="https://i.ibb.co/1DTdSJV/IMG-5590.png"></div>
                    <span>SUNWIN</span>
                </div>
                <div class="game-card" onclick="openKey('LC79', 'toollc79.html')">
                    <div class="game-thumb"><img src="https://i.ibb.co/r2Vq2B8k/IMG-5592.jpg"></div>
                    <span>LC79</span>
                </div>
                <div class="game-card" onclick="openKey('MAX789', 'toolmax789.html')">
                    <div class="game-thumb"><img src="https://i.ibb.co/n8573PZD/IMG-5593.jpg"></div>
                    <span>MAX789</span>
                </div>
                <div class="game-card" onclick="openKey('XOCDIA88', 'toolxocdia88.html')">
                    <div class="game-thumb"><img src="https://i.ibb.co/JWVpBF4j/IMG-5616.png"></div>
                    <span>XOCDIA88</span>
                </div>
                <div class="game-card" onclick="openKey('BETVIP', 'toolbetvip.html')">
                    <div class="game-thumb"><img src="https://i.ibb.co/8DMbjXvT/IMG-4161.png"></div>
                    <span>BETVIP</span>
                </div>
                <div class="game-card" onclick="openKey('68GB', 'tool68gb.html')">
                    <div class="game-thumb"><img src="https://i.ibb.co/WNCHNFrK/IMG-6810.png"></div>
                    <span>68GB</span>
                </div>
            </div>
        </div>

        <div id="key-screen" class="hidden key-box">
            <div id="key-game-name" style="color:var(--primary); font-weight:800; font-size:18px; margin-bottom:10px;"></div>
            <p style="color:#666; font-size:13px;">Vui lòng nhập mã Key VIP để tiếp tục</p>
            
            <div class="key-input-wrap">
                <input type="text" id="key-input" placeholder="••••••••">
            </div>

            <button id="btn-activate" class="btn-main" onclick="verifyFinal()">KÍCH HOẠT NGAY</button>
            <p onclick="backToGame()" style="margin-top:20px; color:#555; cursor:pointer; font-size:13px; font-weight:bold;">QUAY LẠI DANH MỤC</p>
        </div>

        <div class="bottom-bar">
            <button class="menu-btn active" onclick="backToGame()"><span>🏠 Trang chủ</span></button>
            <button class="menu-btn" onclick="showNapTienModal()"><span>💰 Nạp tiền</span></button>
            <button class="menu-btn" onclick="showMuaKeyModal()"><span>🛒 Mua Key</span></button>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title" style="text-align:center; color:var(--primary); margin-top:0;"></h3>
            <div id="modal-body"></div>
            <div style="margin-top:25px; display:flex; flex-direction:column; gap:10px;">
                <button id="modal-confirm-btn" class="btn-main hidden">XÁC NHẬN</button>
                <button onclick="closeModal()" style="background:transparent; border:none; color:#555; font-weight:bold; cursor:pointer; padding:10px;">ĐÓNG</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcWdVTthI3G7AhFHJLyUX_WhMpOOyxCtzv4KvmQ1GUkzedlpGEf0qQRTQgzt1lygsm2w/exec";
        let serverData = {};
        let targetPage = "";
        let selectedPackage = null;
        const username = new URLSearchParams(window.location.search).get("u");

        if (!username) window.location.href = "index.html";

        async function loadUserData() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_info&username=${encodeURIComponent(username)}`);
                const data = await res.json();
                if (data.success) {
                    serverData = data;
                    document.getElementById('balance-amount').innerText = Number(data.balance).toLocaleString('vi-VN') + " đ";
                }
            } catch (e) { console.error("Data error:", e); }
        }

        function openKey(name, url) {
            targetPage = url;
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('key-screen').classList.remove('hidden');
            document.getElementById('key-game-name').innerText = name.toUpperCase();
            document.getElementById('main-title').innerText = "SECURITY";
        }

        function backToGame() {
            document.getElementById('key-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('main-title').innerText = "GAME TOOLS";
        }

        function showNapTienModal() {
            const body = `
                <input type="number" id="nap-amt" placeholder="Nhập số tiền (min 10k)" 
                style="width:100%; padding:15px; background:#000; border:1px solid #333; border-radius:12px; color:var(--primary); font-size:18px; text-align:center;">
            `;
            showModal("NẠP TIỀN", body, "TẠO QR NẠP");
            const btn = document.getElementById('modal-confirm-btn');
            btn.onclick = () => {
                const amt = document.getElementById('nap-amt').value;
                if(amt >= 10000) window.location.href = `qr.html?amount=${amt}&username=${encodeURIComponent(username)}`;
                else alert("Tối thiểu 10,000đ");
            };
        }

        function showMuaKeyModal() {
            const body = `
                <div class="pkg-item" onclick="selectPkg(this, '1ngay', 20000)"><span>💎 Gói 1 Ngày</span><b>20k</b></div>
                <div class="pkg-item" onclick="selectPkg(this, '1tuan', 60000)"><span>🌟 Gói 7 Ngày</span><b>60k</b></div>
                <div class="pkg-item" onclick="selectPkg(this, '1thang', 200000)"><span>🔥 Gói 30 Ngày</span><b>200k</b></div>
                <div class="pkg-item" onclick="selectPkg(this, 'vinhvien', 300000)"><span>👑 Vĩnh Viễn</span><b>300k</b></div>
            `;
            showModal("MUA KEY VIP", body);
        }

        function selectPkg(el, type, price) {
            document.querySelectorAll('.pkg-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedPackage = { type, price };
            const btn = document.getElementById('modal-confirm-btn');
            btn.classList.remove('hidden');
            btn.innerText = `THANH TOÁN ${price.toLocaleString()}đ`;
            btn.onclick = confirmBuy;
        }

        async function confirmBuy() {
            if (Number(serverData.balance) < selectedPackage.price) return alert("Số dư không đủ!");
            const btn = document.getElementById('modal-confirm-btn');
            btn.disabled = true; btn.innerText = "ĐANG XỬ LÝ...";
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "buy_key", username, package: selectedPackage.type, price: selectedPackage.price })
                });
                const data = await res.json();
                if(data.success) { alert("Mua thành công! Vui lòng chờ duyệt."); closeModal(); }
            } catch(e) { alert("Lỗi kết nối!"); }
            btn.disabled = false;
        }

        function verifyFinal() {
            const key = document.getElementById('key-input').value.trim();
            if (key === serverData.key && key !== "keychoduyet") {
                window.location.href = `${targetPage}?u=${encodeURIComponent(username)}`;
            } else {
                alert("Key không đúng hoặc chưa được kích hoạt!");
            }
        }

        function showModal(title, body, btnText) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = body;
            const btn = document.getElementById('modal-confirm-btn');
            if(btnText) { btn.innerText = btnText; btn.classList.remove('hidden'); }
            else { btn.classList.add('hidden'); }
            document.getElementById('custom-modal').classList.add('active');
        }

        function closeModal() { document.getElementById('custom-modal').classList.remove('active'); }
        function goToHoso() { window.location.href = `hoso.html?u=${encodeURIComponent(username)}`; }
        function showInboxModal() { showModal("HỘP THƯ", "<p style='color:#888; text-align:center;'>Không có thông báo mới nào.</p>"); }

        window.onload = loadUserData;
    </script>
</body>
</html>
