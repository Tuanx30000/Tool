<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sunwin</title>
<style>
:root{
  --accent:#00ccff;
  --bg:#000814;
  --bg2:#001a26;
  --text:#eaf6ff;
  --panel:#0b2230cc;
}
*{box-sizing:border-box}
body {
  margin: 0;
  background: linear-gradient(180deg, var(--bg2), var(--bg));
  overflow: hidden;
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  color: var(--text);
}
iframe {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  border: none;
}
.pill {
  position: fixed;
  top: 10px;
  padding: 6px 12px;
  border-radius: 10px;
  font-weight: 700;
  z-index: 10000;
  background: var(--accent);
  color: #001018;
  box-shadow: 0 6px 18px rgba(0,204,255,.25);
  user-select: none;
}
#logout { left: 10px; cursor: pointer; }
#balance { right: 10px; }
#botWrap{
  position: fixed;
  top: 50px;
  left: 50px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 10px;
  touch-action: none;
  cursor: grab;
}
#botWrap:active{ cursor: grabbing; }
#robot {
  width: 120px;
  height: auto;
  user-select: none;
  pointer-events: none;
}
#botPanel{
  min-width: 260px;
  max-width: min(70vw, 420px);
  background: var(--panel);
  backdrop-filter: blur(6px);
  border: 1px solid #0ea5b7;
  border-radius: 12px;
  padding: 10px 12px;
  color: var(--text);
  box-shadow: 0 8px 24px rgba(0,0,0,.35), inset 0 0 0 1px rgba(255,255,255,.04);
}
#botHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:6px;
}
.badge{
  background: #012734;
  border: 1px solid #0ea5b7;
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .3px;
}
#statusDot{
  width:10px;height:10px;border-radius:50%;
  background:#aaa;
  box-shadow:0 0 0 3px #ffffff14;
  margin-left:6px;
}
#summaryLine{
  font-weight:800;
  font-size:16px;
  margin:6px 0 8px;
}
#botBody p{
  margin:4px 0;
  font-size:14px;
}
#botBody .kv{ opacity:.9 }
#botBody .val{ font-weight:800; }
#progressBarWrap{
  position:relative;
  height:6px;
  background:#0a2a38;
  border-radius:999px;
  overflow:hidden;
  margin-top:8px;
}
#progressBar{
  position:absolute;inset:0 100% 0 0;
  background: linear-gradient(90deg, #22d3ee, #0ea5b7);
  transition: inset .2s linear;
}
@media (max-width:480px){
  #robot{ width: 96px; }
  #botPanel{ min-width: 220px; }
}
</style>
</head>
<body>

<div id="logout" class="pill" onclick="window.location.href='main.html'">Đăng xuất</div>

<div id="botWrap">
  <div id="hint">Kéo giữ để di chuyển</div>
  <img id="robot" src="https://i.postimg.cc/63bdy9D9/robotics-1.gif" alt="Robot" draggable="false" />
  <div id="botPanel" aria-live="polite">
    <div id="botHeader">
      <div class="badge">BOT DỰ ĐOÁN</div>
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:12px">Trạng thái</span>
        <div id="statusDot" title="Trạng thái kết nối"></div>
      </div>
    </div>
    <div id="summaryLine">Đang tải…</div>
    <div id="botBody">
      <p class="kv">Độ tin cậy: <span class="val" id="do_tin_cay">…</span></p>
      <p class="kv">Dự đoán: <span class="val" id="duDoan">…</span></p>
      <p class="kv">Phiên: <span class="val" id="phien">…</span></p>
      <div id="progressBarWrap">
        <div id="progressBar"></div>
      </div>
    </div>
  </div>
</div>

<iframe src="https://web.sunwin.mw/?affId=Sunwin"></iframe>

<script>
(() => {
  const API_URL = "https://sunlaymaynkx.hacksieucap.pro/ttsunver2";
  const POLL_MS = 8000;
  const PROGRESS_FPS = 120;

  const botWrap = document.getElementById('botWrap');
  const statusDot = document.getElementById('statusDot');
  const duDoanEl = document.getElementById('duDoan');
  const doTinCayEl = document.getElementById('do_tin_cay');  // Đổi id để rõ ràng hơn
  const phienEl = document.getElementById('phien');
  const progressBar = document.getElementById('progressBar');
  const hint = document.getElementById('hint');
  const summaryLine = document.getElementById('summaryLine');

  const POS_KEY = 'sunwin_bot_pos_v2';
  function clamp(val, min, max){ return Math.min(Math.max(val, min), max); }
  function restorePos(){
    try{
      const saved = JSON.parse(localStorage.getItem(POS_KEY) || 'null');
      if(saved){
        botWrap.style.left = clamp(saved.x, 0, window.innerWidth - botWrap.offsetWidth) + 'px';
        botWrap.style.top  = clamp(saved.y, 0, window.innerHeight - botWrap.offsetHeight) + 'px';
      }
    }catch(e){}
  }
  function savePos(){
    localStorage.setItem(POS_KEY, JSON.stringify({x:botWrap.offsetLeft, y:botWrap.offsetTop}));
  }

  let dragging = false, startX = 0, startY = 0, startLeft = 0, startTop = 0;
  function onPointerDown(e){
    dragging = true;
    hint.style.display = 'none';
    botWrap.setPointerCapture(e.pointerId);
    startX = e.clientX; startY = e.clientY;
    startLeft = botWrap.offsetLeft; startTop = botWrap.offsetTop;
  }
  function onPointerMove(e){
    if(!dragging) return;
    botWrap.style.left = clamp(startLeft + (e.clientX - startX), 0, window.innerWidth - botWrap.offsetWidth) + 'px';
    botWrap.style.top  = clamp(startTop + (e.clientY - startY), 0, window.innerHeight - botWrap.offsetHeight) + 'px';
  }
  function onPointerUp(e){
    if(!dragging) return;
    dragging = false;
    botWrap.releasePointerCapture(e.pointerId);
    savePos();
  }
  botWrap.addEventListener('pointerdown', onPointerDown);
  window.addEventListener('pointermove', onPointerMove);
  window.addEventListener('pointerup', onPointerUp);
  window.addEventListener('resize', restorePos);

  function setOnline(on){
    statusDot.style.background = on ? '#22c55e' : '#f97316';
    statusDot.style.boxShadow = on ? '0 0 0 6px #16a34a22' : '0 0 0 6px #ff7d1a22';
  }

  async function pull(){
    try{
      const resp = await fetch(API_URL, {cache:'no-store'});
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      const j = await resp.json();

      const phien  = Number(j.phien) + 1;
      const du     = j.du_doan_van_sau ?? '—';
      const tin    = j.do_tin_cay ?? '—';  // Sử dụng do_tin_cay từ JSON

      duDoanEl.textContent = du;
      doTinCayEl.textContent = tin;
      phienEl.textContent = phien;

      // màu sắc trực quan
      const low = du.toLowerCase();
      if(low.includes('tài') || low.includes('tai')){
        duDoanEl.style.color = '#22d3ee';
      } else if(low.includes('xỉu') || low.includes('xiu')){
        duDoanEl.style.color = '#fca5a5';
      } else {
        duDoanEl.style.color = '#eaf6ff';
      }

      // summary line chỉ còn độ tin cậy + dự đoán + phiên
      summaryLine.textContent = `${tin} • ${du} • Phiên: ${phien}`;
      setOnline(true);
    }catch(err){
      setOnline(false);
    }
  }

  let progress = 0;
  function loopProgress(){
    progress += (1/(POLL_MS/ (1000/PROGRESS_FPS)));
    if(progress >= 1){
      progress = 0;
      pull();
    }
    progressBar.style.inset = `0 ${(1 - progress) * 100}% 0 0`;
    requestAnimationFrame(loopProgress);
  }

  restorePos();
  pull();
  setInterval(pull, POLL_MS);
  requestAnimationFrame(loopProgress);
  setTimeout(()=> hint.style.display='none', 4000);
})();
</script>
</body>
</html>
