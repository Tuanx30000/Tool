<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>XOCDIA88 MASTER TOOL • TUANX3000</title>
<style>
html, body { 
  margin:0; padding:0; width:100%; height:100%; overflow:hidden; 
  background:#000; font-family:-apple-system, system-ui, sans-serif; 
}
#game-frame { 
  position:absolute; inset:0; width:100%; height:100%; border:0; z-index:1; 
}

/* Menu điều khiển */
#m-btn {
  position:fixed; top:15px; right:15px; width:48px; height:48px;
  background:rgba(0,255,255,0.2); border:1.5px solid #00eaff;
  border-radius:14px; display:flex; justify-content:center; align-items:center;
  z-index:1000005; cursor:pointer; color:#00eaff; font-size:24px; 
  backdrop-filter:blur(15px);
}
#m-panel {
  position:fixed; top:75px; right:15px; width:210px;
  background:rgba(10,10,15,0.95); border:1px solid #00eaff;
  border-radius:18px; display:none; z-index:1000006; overflow:hidden;
  box-shadow: 0 15px 50px rgba(0,0,0,0.8);
}
.m-opt { 
  color:#fff; padding:15px; font-size:13px; font-weight:700; 
  cursor:pointer; border-bottom:1px solid #222; transition: 0.3s; 
}
.m-opt:active { background:rgba(0,234,255,0.2); }
.m-opt.active { color:#00eaff; background:rgba(0,234,255,0.1); }

#back-btn {
  position:fixed; top:15px; left:15px; width:48px; height:48px;
  background:rgba(0,234,255,0.18); border:1.5px solid #00eaff;
  border-radius:14px; display:flex; justify-content:center; align-items:center;
  z-index:1000005; cursor:pointer; color:#00eaff; font-size:22px; 
  backdrop-filter:blur(12px); box-shadow:0 4px 15px rgba(0,234,255,0.25);
}

/* Tool chính */
#tool-root {
  position:fixed; left:50%; top:20%; transform:translate(-50%, -50%) scale(1);
  width:320px; height:158px; border-radius:68px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 22px; z-index:1000000; touch-action:none;
  background:rgba(15,15,22,0.88); backdrop-filter:blur(25px);
  border:1.8px solid rgba(0,234,255,0.45);
  box-shadow:0 25px 60px rgba(0,0,0,0.85); 
  user-select:none;
}
.led { width:58px; height:58px; border-radius:50%; transition:0.4s; }
.l-t { background:#081808; border:2px solid #00ff8811; }
.l-x { background:#180808; border:2px solid #ff335511; }
.on.l-t { background:#00ff88; box-shadow:0 0 50px #00ff88, inset 0 0 15px #fff; transform:scale(1.05); }
.on.l-x { background:#ff3355; box-shadow:0 0 50px #ff3355, inset 0 0 15px #fff; transform:scale(1.05); }

.core { flex:1; text-align:center; padding:0 12px; }
#label { 
  font-size:10px; color:#ffd700; font-weight:900; 
  letter-spacing:1.5px; margin-bottom:4px; text-transform:uppercase; 
}
#sid { 
  font-size:14px; font-weight:900; color:#00eaff; 
  font-family:monospace; letter-spacing:0.5px; 
}
#res { 
  font-size:34px; font-weight:900; color:#fff; 
  text-shadow:0 0 15px rgba(255,255,255,0.5); margin:4px 0; 
}
#stt { 
  font-size:10px; font-weight:800; text-transform:uppercase; 
  letter-spacing:0.6px; margin:2px 0; 
}
#extra-info { 
  font-size:9px; color:#aaa; margin-top:4px; 
}
#ping-box { 
  font-size:8px; color:#666; margin-top:5px; font-weight:bold; 
}
</style>
</head>
<body>

<iframe id="game-frame" src="https://play.xocdia88.green"></iframe>

<div id="m-btn" onclick="toggleMenu()">☰</div>
<div id="back-btn" onclick="goBack()">←</div>

<div id="m-panel">
  <div class="m-opt" id="o-nohu" onclick="setMode('nohu')">TX NỔ HŨ - LIVE</div>
  <div class="m-opt" id="o-md5" onclick="setMode('md5')">TX MD5 - LIVE</div>
  <div class="m-opt" onclick="resize(1.1)">PHÓNG TO (+)</div>
  <div class="m-opt" onclick="resize(0.9)">THU NHỎ (-)</div>
  <div class="m-opt" style="color:#ffcc00" onclick="location.reload()">LÀM MỚI TOOL</div>
</div>

<div id="tool-root">
  <div id="led-t" class="led l-t"></div>
  <div class="core">
    <div id="label">XOCDIA88 MASTER PRO</div>
    <div id="sid">#CONNECTING</div>
    <div id="res">...</div>
    <div id="stt">ĐANG KHỞI TẠO AI</div>
    <div id="extra-info">Rate: -- | Win: --</div>
    <div id="ping-box">Ping: --ms | TuanX3000 v10.3</div>
  </div>
  <div id="led-x" class="led l-x"></div>
</div>

<script>
// ================== CẤU HÌNH API RAILWAY ==================
const API_URL = "https://apixocdia88-production.up.railway.app/api/all";
const urlParams = new URLSearchParams(window.location.search);
const currentUser = urlParams.get('u') || localStorage.getItem('tuanx3000_user');

let currentMode = localStorage.getItem('xocdia_mode') || 'nohu'; 
let currentScale = parseFloat(localStorage.getItem('xocdia_scale')) || 1.0;
let abortCtrl = null;

function goBack() {
    window.location.href = `main.html?u=${encodeURIComponent(currentUser)}`;
}

async function refreshData() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  
  const startTime = Date.now();
  try {
    const res = await fetch(API_URL, { signal: abortCtrl.signal });
    const json = await res.json();
    
    // Cấu trúc mới: json.data.nohu hoặc json.data.md5
    const modeData = json.data[currentMode];

    if (modeData) {
      renderUI(modeData, Date.now() - startTime);
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      document.getElementById("stt").innerText = "LỖI KẾT NỐI SERVER";
    }
  }
}

function renderUI(data, ping) {
  document.getElementById("sid").innerText = `#${data.phien_tiep}`;
  document.getElementById("res").innerText = data.du_doan.toUpperCase();

  // Đèn LED
  const isTai = data.du_doan.toUpperCase().includes("TÀI");
  const isXiu = data.du_doan.toUpperCase().includes("XỈU");
  document.getElementById("led-t").classList.toggle("on", isTai);
  document.getElementById("led-x").classList.toggle("on", isXiu);

  // Status và Độ tin cậy
  const stt = document.getElementById("stt");
  const conf = parseInt(data.tin_cay);
  stt.innerText = `ĐỘ TIN CẬY: ${data.tin_cay}`;
  stt.style.color = conf >= 80 ? "#00ff88" : "#ffd700";

  // Thống kê từ Server
  document.getElementById("extra-info").innerText = `Rate: ${data.stats.rate} | Win: ${data.stats.win}`;
  document.getElementById("ping-box").innerText = `Ping: ${ping}ms | TuanX3000 PRO`;
}

function setMode(m) {
  currentMode = m;
  localStorage.setItem('xocdia_mode', m);
  document.getElementById("o-nohu").classList.toggle("active", m === 'nohu');
  document.getElementById("o-md5").classList.toggle("active", m === 'md5');
  document.getElementById("label").innerText = `XOCDIA88 ${m.toUpperCase()} LIVE`;
  if (document.getElementById("m-panel").style.display === "block") toggleMenu();
  refreshData();
}

function toggleMenu() {
  const p = document.getElementById("m-panel");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

function resize(f) {
  currentScale = Math.max(0.6, Math.min(1.5, currentScale * f));
  localStorage.setItem('xocdia_scale', currentScale);
  document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
}

// Xử lý kéo thả
const el = document.getElementById("tool-root");
let isDrag = false, offset = [0, 0];

const start = (e) => {
  isDrag = true;
  el.style.transition = 'none';
  const c = e.touches ? e.touches[0] : e;
  offset = [c.clientX - el.offsetLeft, c.clientY - el.offsetTop];
};
const move = (e) => {
  if (!isDrag) return;
  const c = e.touches ? e.touches[0] : e;
  el.style.left = (c.clientX - offset[0]) + 'px';
  el.style.top = (c.clientY - offset[1]) + 'px';
};
const end = () => { isDrag = false; el.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; };

el.addEventListener('mousedown', start);
el.addEventListener('touchstart', start, {passive: false});
window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move, {passive: false});
window.addEventListener('mouseup', end);
window.addEventListener('touchend', end);

// Khởi chạy
document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
setMode(currentMode);
setInterval(refreshData, 3000);
refreshData();
</script>
</body>
</html>
