<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán - TUANX3000</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #0a0a12, #1a1a2e);
        color: #00ff41;
        text-align: center;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 15px;
    }
    .container {
        width: 100%;
        max-width: 420px;
    }
    h1 {
        color: #ffd700;
        margin-bottom: 10px;
        font-size: 24px;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
    }
    .card {
        background: #16213e;
        padding: 25px 20px;
        border-radius: 20px;
        border: 2px solid #00ff41;
        box-shadow: 0 10px 40px rgba(0, 255, 65, 0.2);
        margin-bottom: 20px;
    }
    .qr-container {
        margin: 20px 0;
        padding: 15px;
        background: white;
        border-radius: 15px;
        display: inline-block;
    }
    #qr {
        width: 300px;
        height: 300px;
        border: 6px solid #00ff41;
        border-radius: 12px;
    }
    .amount {
        color: #00ff88;
        font-size: 32px;
        font-weight: bold;
        margin: 15px 0 8px;
    }
    .username {
        color: #ffff00;
        font-size: 18px;
        font-weight: bold;
    }
    .info {
        background: #0f1b33;
        padding: 14px;
        border-radius: 10px;
        margin: 12px 0;
        text-align: left;
        font-size: 15px;
        border-left: 4px solid #00ff41;
    }
    .copy {
        float: right;
        background: #00ff41;
        color: #000;
        border: none;
        padding: 6px 14px;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
        font-size: 13px;
        transition: 0.2s;
    }
    .copy:active { transform: scale(0.9); }
    
    /* STYLE CHO NÚT ĐÃ THANH TOÁN VÀ QUAY LẠI */
    .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
    .btn-paid {
        background: linear-gradient(90deg, #008000, #00ff41);
        color: #000; padding: 16px; border: none; border-radius: 12px;
        font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase;
        box-shadow: 0 5px 15px rgba(0, 255, 65, 0.3); transition: 0.3s;
    }
    .btn-paid:active { transform: translateY(2px); }
    
    .btn-back {
        background: #333; color: #fff; padding: 14px; border: none; border-radius: 12px;
        font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s;
    }
    
    .note { color: #888; font-size: 13px; margin-top: 15px; }
</style>
</head>
<body>

<div class="container">
    <h1>💰 QUÉT MÃ QR NẠP TIỀN</h1>

    <div class="card">
        <div class="qr-container">
            <img id="qr" alt="QR Code">
        </div>
        <div class="amount" id="amountText"></div>
        <div>Tài khoản: <span class="username" id="usernameText"></span></div>
    </div>

    <div class="card">
        <div class="info">🏦 VietinBank</div>
        <div class="info">
            STK: 104886445215
            <button class="copy" onclick="copy('104886445215')">Copy</button>
        </div>
        <div class="info">
            👤 LO VAN SY
        </div>
        <div class="info">
            💰 <span id="amount2"></span>
        </div>
        <div class="info">
            📝 Nội dung: <span id="noidung" style="color:#ffff00; font-weight:bold;"></span>
            <button class="copy" onclick="copyContent()">Copy</button>
        </div>
        
        <div class="action-buttons">
            <button id="btn-paid" class="btn-paid" onclick="xacNhanThanhToan()">✅ ĐÃ THANH TOÁN</button>
            <button class="btn-back" onclick="window.location.href='main.html'">🔙 QUAY LẠI TRANG CHỦ</button>
        </div>
    </div>

    <div class="note">
        Quét mã QR bằng ứng dụng ngân hàng. Sau khi chuyển khoản thành công, hãy bấm "ĐÃ THANH TOÁN" để gửi yêu cầu cho Admin.
    </div>
</div>

<script>
// Lấy link Apps Script để bắn thông báo về Telegram
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcWdVTthI3G7AhFHJLyUX_WhMpOOyxCtzv4KvmQ1GUkzedlpGEf0qQRTQgzt1lygsm2w/exec";

// Lấy dữ liệu từ URL
const params = new URLSearchParams(window.location.search);
const amount = params.get("amount") || "0";
const username = params.get("username") || "khongten";

const stk = "104886445215";
const bank = "vietinbank";
const name = "LO VAN SY";
const content = `nap ${username}`;

// Tạo QR Code
const qrUrl = `https://img.vietqr.io/image/${bank}-${stk}-compact.png?amount=${amount}&addInfo=${encodeURIComponent(content)}&accountName=${encodeURIComponent(name)}`;

document.getElementById("qr").src = qrUrl;
document.getElementById("amountText").innerText = Number(amount).toLocaleString('vi-VN') + " VND";
document.getElementById("amount2").innerText = Number(amount).toLocaleString('vi-VN') + " VND";
document.getElementById("usernameText").innerText = username;
document.getElementById("noidung").innerText = content;

function copy(text) {
    navigator.clipboard.writeText(text);
    alert("✅ Đã copy STK!");
}

function copyContent() {
    navigator.clipboard.writeText(content);
    alert("✅ Đã copy nội dung nạp!");
}

// Xử lý nút ĐÃ THANH TOÁN
async function xacNhanThanhToan() {
    if (amount === "0") {
        alert("⚠️ Vui lòng thao tác nạp tiền từ trang chủ!");
        window.location.href = "main.html";
        return;
    }

    const btn = document.getElementById('btn-paid');
    btn.innerText = "⏳ ĐANG GỬI YÊU CẦU...";
    btn.disabled = true;

    try {
        await fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ action: "nap_request", username: username, amount: amount }) 
        });
        alert("✅ Hệ thống đã ghi nhận! Vui lòng chờ Admin cộng tiền (1-3 phút).");
        window.location.href = "index.html";
    } catch (e) {
        // Fallback nếu mạng lỗi
        alert("✅ Đã gửi thông báo. Hãy liên hệ Telegram @Tuanx3000 nếu quá 5 phút chưa nhận được tiền.");
        window.location.href = "index.html";
    }
}
</script>

</body>
</html>
