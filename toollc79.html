<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>LC79 MASTER TOOL • TUANX3000 PRO</title>
<style>
html, body { 
  margin:0; padding:0; width:100%; height:100%; overflow:hidden; 
  background:#000; font-family:-apple-system, system-ui, sans-serif; 
}
#game-frame { 
  position:absolute; inset:0; width:100%; height:100%; border:0; z-index:1; 
}

/* Menu điều khiển */
#m-btn {
  position:fixed; top:15px; right:15px; width:48px; height:48px;
  background:rgba(255,215,0,0.15); border:1.5px solid #ffd700;
  border-radius:14px; display:flex; justify-content:center; align-items:center;
  z-index:1000005; cursor:pointer; color:#ffd700; font-size:24px; 
  backdrop-filter:blur(15px);
}
#m-panel {
  position:fixed; top:75px; right:15px; width:210px;
  background:rgba(15,10,0,0.96); border:1px solid #ffd700;
  border-radius:18px; display:none; z-index:1000006; overflow:hidden;
  box-shadow: 0 15px 50px rgba(0,0,0,0.9);
}
.m-opt { 
  color:#fff; padding:15px; font-size:13px; font-weight:700; 
  cursor:pointer; border-bottom:1px solid #333; transition: 0.3s; 
}
.m-opt:active { background:rgba(255,215,0,0.2); }
.m-opt.active { color:#ffd700; background:rgba(255,215,0,0.1); }

#back-btn {
  position:fixed; top:15px; left:15px; width:48px; height:48px;
  background:rgba(255,255,255,0.1); border:1.5px solid #fff;
  border-radius:14px; display:flex; justify-content:center; align-items:center;
  z-index:1000005; cursor:pointer; color:#fff; font-size:22px; 
  backdrop-filter:blur(12px);
}

/* Tool chính */
#tool-root {
  position:fixed; left:50%; top:20%; transform:translate(-50%, -50%) scale(1);
  width:330px; height:160px; border-radius:80px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 25px; z-index:1000000; touch-action:none;
  background:rgba(10,10,10,0.85); backdrop-filter:blur(30px);
  border:2px solid rgba(255,215,0,0.5);
  box-shadow:0 25px 80px rgba(0,0,0,0.9); 
  user-select:none; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.led { width:62px; height:62px; border-radius:50%; transition:0.4s; }
.l-t { background:#081808; border:2px solid #00ff8811; }
.l-x { background:#180808; border:2px solid #ff335511; }
.on.l-t { background:#00ff88; box-shadow:0 0 50px #00ff88, inset 0 0 15px #fff; transform:scale(1.08); }
.on.l-x { background:#ff3355; box-shadow:0 0 50px #ff3355, inset 0 0 15px #fff; transform:scale(1.08); }

.core { flex:1; text-align:center; padding:0 10px; }
#label { 
  font-size:11px; color:#ffd700; font-weight:900; 
  letter-spacing:1.5px; margin-bottom:3px; text-transform:uppercase; 
}
#sid { 
  font-size:15px; font-weight:900; color:#fff; 
  font-family:monospace; opacity:0.8;
}
#res { 
  font-size:38px; font-weight:900; color:#fff; 
  text-shadow:0 0 20px rgba(255,215,0,0.6); margin:2px 0; 
}
#stt { 
  font-size:10px; font-weight:800; text-transform:uppercase; 
  letter-spacing:0.5px; line-height:1.2; 
}
#extra-info { 
  font-size:9px; color:#ffd700; margin-top:4px; font-weight:bold;
}
#ping-box { 
  font-size:8px; color:#666; margin-top:5px; font-weight:bold;
}
</style>
</head>
<body>

<iframe id="game-frame" src="https://lc79.bet"></iframe>

<div id="m-btn" onclick="toggleMenu()">☰</div>
<div id="back-btn" onclick="goBack()">←</div>

<div id="m-panel">
  <div class="m-opt" id="o-md5" onclick="setMode('md5')">LC79 MD5 - LIVE</div>
  <div class="m-opt" id="o-nohu" onclick="setMode('nohu')">LC79 NỔ HŨ - LIVE</div>
  <div class="m-opt" onclick="resize(1.1)">PHÓNG TO (+)</div>
  <div class="m-opt" onclick="resize(0.9)">THU NHỎ (-)</div>
  <div class="m-opt" style="color:#ffcc00" onclick="location.reload()">LÀM MỚI TOOL</div>
</div>

<div id="tool-root">
  <div id="led-t" class="led l-t"></div>
  <div class="core">
    <div id="label">LC79 MASTER • TUANX3000</div>
    <div id="sid">PHIÊN: #---</div>
    <div id="res">...</div>
    <div id="stt">ĐANG PHÂN TÍCH...</div>
    <div id="extra-info">RATE: -- | WIN: --</div>
    <div id="ping-box">Ping: --ms | Core V10.3 PRO</div>
  </div>
  <div id="led-x" class="led l-x"></div>
</div>

<script>
// ================== CẤU HÌNH API ==================
const API_URL = "https://apimax789-production.up.railway.app/api/all";
const urlParams = new URLSearchParams(window.location.search);
const currentUser = urlParams.get('u') || localStorage.getItem('tuanx3000_user');

let currentMode = localStorage.getItem('lc79_mode') || 'nohu'; 
let currentScale = parseFloat(localStorage.getItem('lc79_scale')) || 1.0;
let abortCtrl = null;

function goBack() {
    window.location.href = `main.html?u=${encodeURIComponent(currentUser)}`;
}

// ================== CẬP NHẬT DỮ LIỆU ==================
async function refreshData() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  
  const startTime = Date.now();
  try {
    const res = await fetch(API_URL, { signal: abortCtrl.signal, cache: "no-store" });
    const json = await res.json();
    
    // Truy cập theo cấu trúc: json.data.nohu hoặc json.data.md5
    const modeData = json.data[currentMode];

    if (modeData) {
      renderUI(modeData, Date.now() - startTime);
    }
  } catch (err) {
    if (err.name !== 'AbortError') {
      console.log("Reconnecting...");
      document.getElementById("stt").innerText = "MẤT KẾT NỐI SERVER";
      document.getElementById("stt").style.color = "#ff3355";
    }
  }
}

function renderUI(data, ping) {
  // 1. Cập nhật Phiên và Kết quả
  document.getElementById("sid").innerText = `PHIÊN: #${data.phien_tiep}`;
  const ketQua = data.du_doan.toUpperCase();
  document.getElementById("res").innerText = ketQua;

  // 2. Hệ thống đèn LED
  const isTai = ketQua.includes("TÀI");
  const isXiu = ketQua.includes("XỈU");
  document.getElementById("led-t").classList.toggle("on", isTai);
  document.getElementById("led-x").classList.toggle("on", isXiu);

  // 3. Phân tích Logic & Độ tin cậy
  const stt = document.getElementById("stt");
  stt.innerText = data.phan_tich || `ĐỘ TIN CẬY: ${data.tin_cay}`;
  
  // Đổi màu theo logic phân tích
  if (data.phan_tich.includes("BỆT")) stt.style.color = "#00ff88"; 
  else if (data.phan_tich.includes("VOTE")) stt.style.color = "#00eaff";
  else stt.style.color = "#ffd700";

  // 4. Thống kê tỉ lệ
  document.getElementById("extra-info").innerText = `RATE: ${data.stats.rate} | WIN: ${data.stats.win}`;
  document.getElementById("ping-box").innerText = `Ping: ${ping}ms | TUANX3000 PRO`;
}

// ================== ĐIỀU KHIỂN ==================
function setMode(m) {
  currentMode = m;
  localStorage.setItem('lc79_mode', m);
  document.getElementById("o-md5").classList.toggle("active", m === 'md5');
  document.getElementById("o-nohu").classList.toggle("active", m === 'nohu');
  document.getElementById("label").innerText = `LC79 ${m.toUpperCase()} PRO`;
  if (document.getElementById("m-panel").style.display === "block") toggleMenu();
  refreshData();
}

function toggleMenu() {
  const p = document.getElementById("m-panel");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

function resize(f) {
  currentScale = Math.max(0.6, Math.min(1.5, currentScale * f));
  localStorage.setItem('lc79_scale', currentScale);
  document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
}

// Logic kéo thả mượt mà
const el = document.getElementById("tool-root");
let isDrag = false, offset = [0, 0];

const start = (e) => {
  isDrag = true;
  el.style.transition = 'none';
  const c = e.touches ? e.touches[0] : e;
  offset = [c.clientX - el.offsetLeft, c.clientY - el.offsetTop];
};
const move = (e) => {
  if (!isDrag) return;
  const c = e.touches ? e.touches[0] : e;
  el.style.left = (c.clientX - offset[0]) + 'px';
  el.style.top = (c.clientY - offset[1]) + 'px';
};
const end = () => {
  isDrag = false;
  el.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
};

el.addEventListener('mousedown', start);
el.addEventListener('touchstart', start, {passive: false});
window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move, {passive: false});
window.addEventListener('mouseup', end);
window.addEventListener('touchend', end);

// KHỞI CHẠY
document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
setMode(currentMode);
setInterval(refreshData, 3500); 
refreshData();
</script>
</body>
</html>
