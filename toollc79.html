<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>LC79 MASTER TOOL • ANH TUẤN MMO</title>
<style>
/* Reset & UI Cao Cấp */
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:-apple-system, system-ui, sans-serif; }
#game-frame { position:absolute; inset:0; width:100%; height:100%; border:0; z-index:1; }

/* Menu Điều Khiển */
#m-btn {
  position:fixed; top:15px; right:15px; width:48px; height:48px;
  background:rgba(0,255,255,0.2); border:1.5px solid #00eaff;
  border-radius:14px; display:flex; justify-content:center; align-items:center;
  z-index:1000005; cursor:pointer; color:#00eaff; font-size:24px; backdrop-filter:blur(15px);
}
#m-panel {
  position:fixed; top:75px; right:15px; width:210px;
  background:rgba(10,10,15,0.95); border:1px solid #00eaff;
  border-radius:18px; display:none; z-index:1000006; overflow:hidden;
  box-shadow: 0 15px 50px rgba(0,0,0,0.8);
}
.m-opt { color:#fff; padding:15px; font-size:13px; font-weight:700; cursor:pointer; border-bottom:1px solid #222; transition: 0.3s; }
.m-opt:active { background:rgba(0,234,255,0.2); }
.m-opt.active { color:#00eaff; background:rgba(0,234,255,0.1); }

/* Widget Tool Main */
#tool-root {
  position:fixed; left:50%; top:20%; transform:translate(-50%, -50%) scale(1);
  width:320px; height:135px; border-radius:68px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 22px; z-index:1000000; touch-action:none;
  background:rgba(15,15,22,0.85); backdrop-filter:blur(25px);
  border:1.5px solid rgba(0,234,255,0.4);
  box-shadow:0 25px 60px rgba(0,0,0,0.8); user-select:none;
}
.led { width:58px; height:58px; border-radius:50%; transition:0.4s; }
.l-t { background:#081808; border:2px solid #00ff8811; }
.l-x { background:#180808; border:2px solid #ff335511; }
.on.l-t { background:#00ff88; box-shadow:0 0 50px #00ff88, inset 0 0 15px #fff; transform:scale(1.05); }
.on.l-x { background:#ff3355; box-shadow:0 0 50px #ff3355, inset 0 0 15px #fff; transform:scale(1.05); }

.core { flex:1; text-align:center; padding:0 10px; }
#label { font-size:10px; color:#ffd700; font-weight:900; letter-spacing:1.5px; margin-bottom:4px; text-transform:uppercase; }
#sid { font-size:14px; font-weight:900; color:#00eaff; font-family:monospace; letter-spacing:0.5px; }
#res { font-size:28px; font-weight:900; color:#fff; text-shadow:0 0 15px rgba(255,255,255,0.4); margin:2px 0; }
#stt { font-size:9px; font-weight:800; color:#00ff88; text-transform:uppercase; }
#ping-box { font-size:8px; color:#555; margin-top:3px; font-weight:bold; }
</style>
</head>
<body>

<iframe id="game-frame" src="https://play.lc79.bet/"></iframe>
<div id="m-btn" onclick="toggleMenu()">☰</div>

<div id="m-panel">
  <div class="m-opt" id="o-md5" onclick="setMode('md5')">TX MD5 - LIVE</div>
  <div class="m-opt" id="o-nohu" onclick="setMode('nohu')">TX NỔ HŨ - LIVE</div>
  <div class="m-opt" onclick="resize(1.1)">PHÓNG TO (+)</div>
  <div class="m-opt" onclick="resize(0.9)">THU NHỎ (-)</div>
  <div class="m-opt" style="color:#ffcc00" onclick="location.reload()">LÀM MỚI TOOL</div>
</div>

<div id="tool-root">
  <div id="led-t" class="led l-t"></div>
  <div class="core">
    <div id="label">PROXY RIÊNG ACTIVE</div>
    <div id="sid">#DANG_KET_NOI</div>
    <div id="res">...</div>
    <div id="stt">ĐANG KHỞI TẠO AI</div>
    <div id="ping-box">Ping: --ms | Server: OK</div>
  </div>
  <div id="led-x" class="led l-x"></div>
</div>

<script>
// ================== CẤU HÌNH HỆ THỐNG (ĐÃ FIX) ==================
const PRIVATE_API = "https://ancient-poetry-7f56.lot896613.workers.dev/?mode=";
let mode = localStorage.getItem('tuan_mmo_mode') || 'md5'; 
let currentScale = parseFloat(localStorage.getItem('tuan_mmo_scale')) || 1.0;
let abortCtrl = null;

// ================== LOGIC LẤY DỮ LIỆU TỐI ƯU ==================
async function refresh() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  
  const start = Date.now();
  try {
    const res = await fetch(PRIVATE_API + mode, { signal: abortCtrl.signal });
    const data = await res.json();
    const list = data.list || data.data?.list || data.data?.sessions || data;

    if (Array.isArray(list) && list.length > 0) {
      const last = list[0];
      let rawId = String(last.id || last.sessionId || "0");
      let nextId = rawId;

      // FIX LỖI SỐ LỚN (BIGINT) - CHUẨN PHIÊN 100%
      let match = rawId.match(/\d+/);
      if (match) {
        nextId = rawId.replace(match[0], (BigInt(match[0]) + 1n).toString());
      }

      const ai = runAI(list);
      const ping = Date.now() - start;
      updateUI(nextId, ai.r, ai.c, ping);
    }
  } catch (e) {
    if (e.name !== 'AbortError') console.error("Lỗi fetch API riêng.");
  }
}

// ================== THUẬT TOÁN AI NÂNG CAO ==================
function runAI(list) {
  const history = list.slice(0, 150).map(i => {
    const s = String(i.resultTruyenThong || i.result || "").toUpperCase();
    return (s.includes("TÀI") || s.includes("TAI")) ? "T" : "X";
  }).join("");
  
  let t = 0, x = 0;
  const pattern = history.substring(0, 3);
  for(let i=1; i < history.length - 3; i++) {
    if(history.substring(i, i+3) === pattern) {
      history[i-1] === "T" ? t++ : x++;
    }
  }

  let final = (t >= x) ? "TÀI" : "XỈU";
  let percent = 55 + (Math.abs(t - x) * 8);

  // PHÁT HIỆN BỆT (CẦU DÀI)
  let betCount = 1;
  for(let i=1; i<7; i++) { if(history[i] === history[0]) betCount++; else break; }
  if(betCount >= 4) { final = history[0] === "T" ? "TÀI" : "XỈU"; percent += 15; }

  return { r: final, c: Math.min(98, percent) };
}

// ================== CẬP NHẬT GIAO DIỆN ==================
function updateUI(id, r, c, ping) {
  document.getElementById("sid").innerText = `#${id}`;
  document.getElementById("res").innerText = r;
  document.getElementById("ping-box").innerText = `Ping: ${ping}ms | Proxy: Private`;
  
  document.getElementById("led-t").classList.toggle("on", r === "TÀI");
  document.getElementById("led-x").classList.toggle("on", r === "XỈU");

  const stt = document.getElementById("stt");
  stt.style.color = c > 80 ? "#00ff88" : "#ffd700";
  stt.innerText = c > 80 ? "TỶ LỆ THẮNG CAO" : "KÈO THƠM - VÀO ĐỀU";
}

// ================== ĐIỀU KHIỂN & CÀI ĐẶT ==================
function setMode(m) {
  mode = m; 
  localStorage.setItem('tuan_mmo_mode', m);
  document.getElementById("o-md5").classList.toggle("active", m === 'md5');
  document.getElementById("o-nohu").classList.toggle("active", m === 'nohu');
  document.getElementById("label").innerText = m === 'md5' ? 'PROXY MD5 ACTIVE' : 'PROXY NỔ HŨ ACTIVE';
  toggleMenu();
  refresh();
}

function toggleMenu() { const p = document.getElementById("m-panel"); p.style.display = p.style.display === "block" ? "none" : "block"; }

function resize(f) {
  currentScale = Math.max(0.6, Math.min(1.5, currentScale * f));
  localStorage.setItem('tuan_mmo_scale', currentScale);
  document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
}

// HỆ THỐNG KÉO THẢ MƯỢT (MOBILE/PC)
const el = document.getElementById("tool-root");
let isDrag = false, offset = [0,0];
const startDrag = (e) => {
  isDrag = true; el.style.transition = 'none';
  const c = e.touches ? e.touches[0] : e;
  offset = [c.clientX - el.offsetLeft, c.clientY - el.offsetTop];
};
const moveDrag = (e) => {
  if (!isDrag) return;
  const c = e.touches ? e.touches[0] : e;
  el.style.left = (c.clientX - offset[0]) + 'px';
  el.style.top = (c.clientY - offset[1]) + 'px';
};
el.addEventListener('mousedown', startDrag); el.addEventListener('touchstart', startDrag, {passive: false});
window.addEventListener('mousemove', moveDrag); window.addEventListener('touchmove', moveDrag, {passive: false});
window.addEventListener('mouseup', () => { isDrag = false; el.style.transition = 'transform 0.3s'; });
window.addEventListener('touchend', () => isDrag = false);

// KHỞI CHẠY LẦN ĐẦU
document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
setMode(mode);
setInterval(refresh, 4000); // 4 giây quét 1 lần là mượt nhất
</script>
</body>
</html>
