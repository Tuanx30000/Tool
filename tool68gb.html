<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>68GAME BÀI</title>
<style>
:root {
  --primary-red: #ff0033; /* Màu đỏ chủ đạo */
  --glow-red: rgba(255, 0, 51, 0.5);
  --glass: rgba(10, 5, 5, 0.92);
  --green-led: #00ff88;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: system-ui, -apple-system, sans-serif; }

/* Iframe Game */
#game-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; z-index: 1; }

/* Nút điều hướng tông Đỏ */
.m-btn-ctrl {
  position: fixed; top: 15px; width: 48px; height: 48px;
  background: var(--glass); border: 1.5px solid var(--primary-red);
  border-radius: 14px; display: flex; justify-content: center; align-items: center;
  z-index: 1000005; cursor: pointer; color: var(--primary-red); font-size: 24px; 
  backdrop-filter: blur(15px); box-shadow: 0 0 15px var(--glow-red);
}
#back-btn { left: 15px; }
#menu-toggle { right: 15px; }

/* Menu Panel */
#m-panel {
  position: fixed; top: 72px; right: 15px; width: 210px;
  background: var(--glass); border: 1px solid var(--primary-red);
  border-radius: 18px; display: none; z-index: 1000006; overflow: hidden;
  box-shadow: 0 10px 40px rgba(0,0,0,0.9);
}
.m-opt { 
  color: #fff; padding: 15px; font-size: 13px; font-weight: 700; 
  cursor: pointer; border-bottom: 1px solid #300; transition: 0.3s; 
}
.m-opt:active { background: rgba(255, 0, 51, 0.2); }
.m-opt.active { color: var(--primary-red); background: rgba(255, 0, 51, 0.1); }

/* KHUNG TOOL VIÊN NANG VIỀN ĐỎ */
#tool-root {
  position: fixed; left: 50%; top: 20%; transform: translate(-50%, -50%) scale(1);
  width: 325px; height: 155px; border-radius: 77px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 25px; z-index: 1000000; touch-action: none;
  background: var(--glass); 
  backdrop-filter: blur(25px);
  /* Viền đỏ Neon */
  border: 2px solid var(--primary-red);
  box-shadow: 0 0 25px var(--glow-red), inset 0 0 15px rgba(255, 0, 51, 0.1);
  user-select: none;
}

/* Đèn LED hai đầu */
.led { 
  width: 60px; height: 60px; border-radius: 50%; 
  transition: 0.4s; display: flex; justify-content: center; 
  align-items: center; font-weight: 900; font-size: 22px; 
  color: rgba(255,255,255,0.05); background: #1a0505;
}

/* Hiệu ứng khi LED bật */
.on.l-t { background: var(--green-led); color: #fff; box-shadow: 0 0 40px var(--green-led), inset 0 0 15px #fff; transform: scale(1.08); }
.on.l-x { background: var(--primary-red); color: #fff; box-shadow: 0 0 40px var(--primary-red), inset 0 0 15px #fff; transform: scale(1.08); }

/* Nội dung trung tâm */
.core { flex: 1; text-align: center; padding: 0 10px; }
#label { font-size: 10px; color: #ffd700; font-weight: 900; letter-spacing: 1.5px; margin-bottom: 5px; }
#sid { font-size: 13px; font-weight: 800; color: var(--primary-red); opacity: 0.9; font-family: monospace; }
#res { font-size: 40px; font-weight: 900; color: #fff; margin: 2px 0; text-shadow: 0 0 15px rgba(255,255,255,0.4); }
#stt { font-size: 9px; font-weight: 800; color: var(--green-led); text-transform: uppercase; letter-spacing: 1px; }

/* Thanh Progress Đỏ */
#progress-container { width: 60%; height: 2px; background: #200; margin: 8px auto 0; border-radius: 10px; overflow: hidden; }
#progress-bar { height: 100%; width: 0%; background: var(--primary-red); box-shadow: 0 0 8px var(--primary-red); }

#ping-box { font-size: 8px; color: #666; margin-top: 6px; font-weight: bold; }
</style>
</head>
<body>

<iframe id="game-frame" src="https://68gbcskh2.cfd/?code=25263223"></iframe>

<div id="back-btn" class="m-btn-ctrl" onclick="window.history.back()">←</div>
<div id="menu-toggle" class="m-btn-ctrl" onclick="toggleMenu()">☰</div>

<div id="m-panel">
  <div class="m-opt active" id="o-taixiu" onclick="setMode('taixiu')">BÀN XANH (NOHU)</div>
  <div class="m-opt" id="o-md5" onclick="setMode('md5')">BÀN ĐỎ (MD5)</div>
  <div class="m-opt" onclick="changeSize(1.1)">PHÓNG TO (+)</div>
  <div class="m-opt" onclick="changeSize(0.9)">THU NHỎ (-)</div>
  <div class="m-opt" style="color: #ffd700" onclick="location.reload()">LÀM MỚI GAME</div>
</div>

<div id="tool-root">
  <div id="led-t" class="led l-t">T</div>
  <div class="core">
    <div id="label">68GB TUANX3000 </div>
    <div id="sid">PHIÊN: #LOADING</div>
    <div id="res">...</div>
    <div id="stt">AI INITIALIZING</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="ping-box">SECURE CONNECTION | v1.0</div>
  </div>
  <div id="led-x" class="led l-x">X</div>
</div>

<script>
const CONFIG = {
  taixiu: "https://api68gbdimemay-default-rtdb.firebaseio.com/taixiu.json",
  md5: "https://api68gbdimemay-default-rtdb.firebaseio.com/md5.json",
  pollTime: 6500
};

let currentMode = 'taixiu';
let currentScale = 1.0;

// UI Logic
function toggleMenu() {
  const p = document.getElementById("m-panel");
  p.style.display = (p.style.display === "block") ? "none" : "block";
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.m-opt').forEach(el => el.classList.remove('active'));
  document.getElementById(`o-${mode}`).classList.add('active');
  toggleMenu();
  fetchData();
}

function changeSize(f) {
  currentScale = Math.max(0.6, Math.min(1.5, currentScale * f));
  document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
}

// API & AI Logic
async function fetchData() {
  try {
    const response = await fetch(CONFIG[currentMode], { cache: 'no-store' });
    const data = await response.json();
    const keys = Object.keys(data);
    const lastKey = keys[keys.length - 1];

    // Thuật toán bám cầu nâng cao
    const history = keys.slice(-6).map(k => data[k].tong > 10 ? "T" : "X");
    const tCount = history.filter(v => v === "T").length;
    
    // Dự đoán logic: Nếu cầu đang bệt (quá 4 phiên cùng màu) thì gợi ý bẻ, ngược lại bám xu hướng
    let predict = "TÀI";
    if (tCount >= 4) predict = "XỈU";
    else if (tCount <= 2) predict = "TÀI";
    else predict = Math.random() > 0.5 ? "TÀI" : "XỈU";

    // Cập nhật giao diện
    document.getElementById("sid").innerText = `PHIÊN: #${Number(lastKey) + 1}`;
    document.getElementById("res").innerText = predict;
    
    const statusTexts = ["HỆ THỐNG ỔN ĐỊNH", "CẦU ĐANG ĐẸP", "TỶ LỆ THẮNG CAO", "PHÂN TÍCH XONG"];
    document.getElementById("stt").innerText = statusTexts[Math.floor(Math.random() * statusTexts.length)];

    // Điều khiển LED
    document.getElementById("led-t").classList.toggle("on", predict === "TÀI");
    document.getElementById("led-x").classList.toggle("on", predict === "XỈU");

  } catch (err) {
    document.getElementById("stt").innerText = "LỖI KẾT NỐI API";
  }
}

// Drag System (Pointer Events)
const tool = document.getElementById("tool-root");
let isDragging = false, offset = [0, 0];

tool.onpointerdown = (e) => {
  isDragging = true;
  tool.style.transition = 'none';
  offset = [e.clientX - tool.offsetLeft, e.clientY - tool.offsetTop];
  tool.setPointerCapture(e.pointerId);
};

window.onpointermove = (e) => {
  if (!isDragging) return;
  tool.style.left = (e.clientX - offset[0]) + 'px';
  tool.style.top = (e.clientY - offset[1]) + 'px';
};

window.onpointerup = () => { 
  isDragging = false; 
  tool.style.transition = 'transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28)';
};

// Vòng lặp đồng bộ
let lastPoll = Date.now();
function syncLoop() {
  const now = Date.now();
  const elapsed = now - lastPoll;
  const progress = (elapsed % CONFIG.pollTime) / CONFIG.pollTime;
  
  document.getElementById("progress-bar").style.width = (progress * 100) + "%";
  
  if (elapsed >= CONFIG.pollTime) {
    lastPoll = now;
    fetchData();
  }
  requestAnimationFrame(syncLoop);
}

// Bắt đầu
fetchData();
syncLoop();
</script>
</body>
</html>
