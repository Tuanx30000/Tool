<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PREMIUM TOOL - TUANX3000</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41;
            --accent: #ff00aa;
            --dark: #080808;
            --glass: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Lexend', sans-serif; 
            margin: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { 
            width: 90%;
            max-width: 400px; 
            padding: 35px 25px; 
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            animation: containerEntry 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .header { text-align: center; margin-bottom: 30px; }
        .badge { 
            background: linear-gradient(90deg, #008000, var(--primary));
            color: #000; 
            font-weight: 800; 
            font-size: 11px; 
            padding: 4px 12px; 
            border-radius: 50px; 
            display: inline-block; 
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        h1 { 
            margin: 0; 
            font-size: 28px; 
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .notif-bar { 
            background: rgba(255, 0, 170, 0.1); 
            border-left: 4px solid var(--accent); 
            color: var(--accent); 
            padding: 14px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
            font-size: 13px; 
            font-weight: 600; 
            text-align: center; 
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }

        .auth-tabs { 
            display: flex; 
            background: rgba(255,255,255,0.05);
            border-radius: 14px;
            padding: 6px;
            margin-bottom: 25px; 
        }
        .tab-btn { 
            flex: 1; 
            padding: 12px; 
            background: transparent; 
            border: none; 
            color: #777; 
            font-weight: 600; 
            cursor: pointer; 
            border-radius: 10px;
            transition: 0.4s; 
        }
        .tab-btn.active { 
            background: #fff;
            color: #000;
            box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }
        
        .form-group { display: none; animation: slideIn 0.5s ease forwards; }
        .form-group.active { display: block; }
        
        .input-box { position: relative; margin-bottom: 15px; }
        input { 
            width: 100%; 
            padding: 16px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); 
            color: #fff; 
            border-radius: 14px; 
            outline: none; 
            font-size: 15px; 
            transition: 0.3s;
            text-align: center;
        }
        input:focus { 
            border-color: var(--primary); 
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.15); 
        }
        
        .btn-submit { 
            width: 100%; 
            padding: 18px; 
            margin-top: 10px; 
            border: none; 
            border-radius: 14px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 16px; 
            text-transform: uppercase; 
            transition: 0.3s;
        }
        .btn-login { background: var(--primary); color: #000; }
        .btn-reg { background: transparent; color: #fff; border: 1px solid #333; }

        #msg-status { 
            margin-top: 20px; 
            font-size: 14px; 
            text-align: center; 
            min-height: 20px;
            font-weight: 500;
        }

        .tele-float {
            position: fixed; bottom: 25px; right: 25px;
            background: #24A1DE; color: white;
            width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; box-shadow: 0 10px 25px rgba(36, 161, 222, 0.4);
            text-decoration: none; z-index: 100;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container" id="main-container">
        <div class="header">
            <span class="badge">System v1.0.4</span>
            <h1>TUANX3000</h1>
        </div>

        <a class="notif-bar" href="https://t.me/tuanx3000" target="_blank">
            TELEGRAM: @TUANX3000 (KEY VIP)
        </a>

        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn" id="tab-reg" onclick="switchTab('register')">REGISTER</button>
        </div>
        
        <div id="login-form" class="form-group active">
            <div class="input-box">
                <input type="text" id="login-user" placeholder="Tên tài khoản">
            </div>
            <div class="input-box">
                <input type="password" id="login-pass" placeholder="Mật khẩu">
            </div>
            <button class="btn-submit btn-login" onclick="handleAuth('login')">VÀO HỆ THỐNG</button>
        </div>
        
        <div id="reg-form" class="form-group">
            <div class="input-box">
                <input type="text" id="reg-user" placeholder="Tạo tài khoản">
            </div>
            <div class="input-box">
                <input type="password" id="reg-pass" placeholder="Tạo mật khẩu">
            </div>
            <div class="input-box">
                <input type="text" id="reg-sdt" placeholder="Số điện thoại">
            </div>
            <button class="btn-submit btn-reg" onclick="handleAuth('register')">ĐĂNG KÝ NGAY</button>
        </div>

        <div id="msg-status"></div>
    </div>

    <a href="https://t.me/+JN91VTTurWAwNjI1" class="tele-float" title="Tham gia Group">✈️</a>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzVYvS-GbzmofAz_hyT0Xn-7BAiEp4Of5_4bpby0Z9BKG_wbyxHPqEwMZWu-w33Rovnaw/exec";

        // Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 0.5 + 0.2
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.speed;
                if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(drawStars);
        }

        function switchTab(tab) {
            document.getElementById('login-form').classList.toggle('active', tab === 'login');
            document.getElementById('reg-form').classList.toggle('active', tab === 'register');
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-reg').classList.toggle('active', tab === 'register');
            document.getElementById('msg-status').innerText = "";
        }

        function setStatus(text, color) {
            const msg = document.getElementById('msg-status');
            msg.style.color = color;
            msg.innerText = text;
        }

        async function handleAuth(type) {
            const btn = document.getElementById(type === 'login' ? 'btn-login-submit' : 'btn-reg-submit') || {disabled: false, innerText: ''};
            const originalText = btn.innerText || (type === 'login' ? 'VÀO HỆ THỐNG' : 'ĐĂNG KÝ NGAY');

            let payload = { action: type };
            if (type === 'login') {
                payload.username = document.getElementById('login-user').value.trim();
                payload.password = document.getElementById('login-pass').value.trim();
            } else {
                payload.username = document.getElementById('reg-user').value.trim();
                payload.password = document.getElementById('reg-pass').value.trim();
                payload.sdt = document.getElementById('reg-sdt').value.trim();
            }

            if (!payload.username || !payload.password) {
                setStatus("❌ Vui lòng nhập đủ thông tin!", "#ff4d4d");
                return;
            }

            btn.disabled = true;
            btn.innerText = "ĐANG XỬ LÝ...";
            setStatus("⏳ Đang kết nối...", "#ffbc00");

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (data.success) {
                    if (type === 'login') {
                        localStorage.setItem('tuanx3000_user', payload.username);
                        setStatus("✅ Đăng nhập thành công!", "#00ff41");
                        setTimeout(() => window.location.href = `main.html?u=${encodeURIComponent(payload.username)}`, 800);
                    } else {
                        setStatus("✅ Đăng ký thành công! Mời đăng nhập.", "#00ff41");
                        setTimeout(() => switchTab('login'), 1500);
                    }
                } else {
                    setStatus("⚠️ " + (data.message || "Lỗi!"), "#ff4d4d");
                }
            } catch (e) {
                console.error(e);
                setStatus("🚫 Lỗi kết nối server!", "#ff4d4d");
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }

        window.onload = () => {
            initCanvas();
            drawStars();
            const savedUser = localStorage.getItem('tuanx3000_user');
            if (savedUser) window.location.href = `main.html?u=${encodeURIComponent(savedUser)}`;
        };
        window.onresize = initCanvas;
    </script>
</body>
</html>
