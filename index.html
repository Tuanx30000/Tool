<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOOL GAME V1 - TUANX3000</title>
    <style>
        body { background-color: #050505; color: #00ff41; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        * { box-sizing: border-box; user-select: none; }
        
        .container { position: relative; z-index: 10; max-width: 450px; margin: 0 auto; padding: 20px; height: 100vh; display: flex; flex-direction: column; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        
        .header { text-align: center; margin-bottom: 15px; }
        .google-badge { background: #fff; color: #444; font-weight: bold; font-size: 10px; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        h1 { margin: 0; color: #00ff41; text-shadow: 0 0 15px rgba(0, 255, 65, 0.5); font-size: 28px; text-transform: uppercase; }
        
        .balance { position: absolute; top: 15px; right: 15px; background: rgba(0, 255, 65, 0.15); border: 1px solid #00ff41; color: #00ff88; padding: 8px 14px; border-radius: 30px; font-size: 13px; font-weight: bold; z-index: 100; }

        .notif-bar { background: rgba(255, 0, 170, 0.1); border: 1px solid #ff00aa; color: #ff00aa; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 12px; font-weight: bold; text-align: center; animation: pulse 2s infinite; display: block; text-decoration: none; }

        .auth-tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: transparent; border: none; color: #666; font-weight: bold; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.3s; }
        .tab-btn.active { color: #00ff41; border-bottom: 2px solid #00ff41; }
        
        .form-group { display: none; animation: slideUp 0.4s ease forwards; }
        .form-group.active { display: block; }
        
        input { width: 100%; padding: 14px; margin: 8px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; text-align: center; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: #00ff41; box-shadow: 0 0 10px rgba(0, 255, 65, 0.2); }
        
        .btn-submit { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; text-transform: uppercase; transition: 0.2s; }
        .btn-login { background: linear-gradient(90deg, #008000, #00ff41); color: #000; }
        .btn-reg { background: linear-gradient(90deg, #333, #555); color: #fff; }

        .game-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 5px; padding-bottom: 30px; }
        .game-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 8px; text-align: center; cursor: pointer; transition: 0.3s; }
        .game-card:hover { border-color: #00ff41; background: rgba(0, 255, 65, 0.05); }
        
        .game-thumb { width: 100%; height: 75px; background: #000; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid #222; overflow: hidden; transition: 0.3s; }
        .game-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .game-card span { font-weight: bold; font-size: 10px; color: #00ff41; text-transform: uppercase; letter-spacing: 0.5px; }
        
        #msg-status { margin-top: 15px; font-size: 13px; text-align: center; min-height: 20px; font-weight: bold; }
        .hidden { display: none !important; }

        /* BOTTOM BAR */
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 2px solid #00ff41; display: flex; padding: 8px; z-index: 1000; }
        .bottom-btn { flex: 1; padding: 12px; margin: 0 5px; background: #1a1a1a; color: #00ff41; border: 1px solid #00ff41; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; font-size: 13px; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-overlay.active { display: flex; }
        .modal-box { background: #0f0f0f; border: 2px solid #00ff41; border-radius: 20px; padding: 25px; width: 92%; max-width: 380px; box-shadow: 0 0 50px rgba(0,255,65,0.3); }
        .modal-title { color: #00ff41; text-align: center; font-size: 22px; margin-bottom: 20px; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,65,0.4); }

        .package-item { background: #1a1a1a; border: 1px solid #444; padding: 16px; margin: 12px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: all 0.3s; }
        .package-item:hover, .package-item.selected { border-color: #00ff41; background: rgba(0,255,65,0.12); transform: translateY(-3px); }
        .package-name { font-size: 16px; font-weight: bold; color: #ddd; }
        .package-price { font-size: 17px; font-weight: bold; color: #00ff41; }

        .confirm-btn { background: linear-gradient(90deg, #00ff41, #008000); color: #000; padding: 15px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; width: 100%; margin-top: 20px; cursor: pointer; }
        .modal-close-btn { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; cursor: pointer; }

        .tele-float { position: fixed; bottom: 80px; right: 20px; z-index: 99999; background: #0088cc; color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 20px rgba(0, 136, 204, 0.5); animation: float 3s ease-in-out infinite; }
        
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,0,170,0.4); } 70% { box-shadow: 0 0 0 12px rgba(255,0,170,0); } 100% { box-shadow: 0 0 0 0 rgba(255,0,170,0); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>

    <div class="container">
        <!-- ICON HỘP THƯ GÓC TRÁI -->
        <div id="notification-bell" onclick="showInboxModal()" 
             style="position: absolute; top: 15px; left: 15px; background: rgba(0,255,65,0.15); border: 1px solid #00ff41; color: #00ff88; padding: 8px 12px; border-radius: 50%; font-size: 22px; cursor: pointer; z-index: 999; box-shadow: 0 0 15px rgba(0,255,65,0.4);">
            ✉️
        </div>

        <div class="header">
            <span class="google-badge">Tuanx3000</span>
            <h1 id="main-title">TOOL GAME V1</h1>
        </div>

        <div id="balance-display" class="balance hidden">
            💰 Số dư: <span id="balance-amount">0</span> VND
        </div>

        <a class="notif-bar" href="https://t.me/tuanx3000" target="_blank">
            📢 MUA KEY VIP LIÊN HỆ: @TUANX3000
        </a>

        <div id="auth-screen">
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">ĐĂNG NHẬP</button>
                <button class="tab-btn" id="tab-reg" onclick="switchTab('register')">ĐĂNG KÝ</button>
            </div>
            
            <div id="login-form" class="form-group active">
                <input type="text" id="login-user" placeholder="Tên tài khoản">
                <input type="password" id="login-pass" placeholder="Mật khẩu">
                <button class="btn-submit btn-login" onclick="handleAuth('login')">VÀO HỆ THỐNG</button>
            </div>
            
            <div id="reg-form" class="form-group">
                <input type="text" id="reg-user" placeholder="Tên tài khoản mới">
                <input type="password" id="reg-pass" placeholder="Mật khẩu mới">
                <input type="text" id="reg-sdt" placeholder="Số điện thoại">
                <button class="btn-submit btn-reg" onclick="handleAuth('register')">ĐĂNG KÝ NGAY</button>
            </div>
        </div>

        <div id="game-screen" class="hidden">
            <p style="text-align:center; font-size:11px; color:#888; margin-bottom:15px;">CHỌN GAME ĐỂ KÍCH HOẠT</p>
            <div class="game-grid">
                <div class="game-card" onclick="openKey('SUNWIN', 'toolsunwin.html')"><div class="game-thumb"><img src="https://i.ibb.co/1DTdSJV/IMG-5590.png" alt="Sunwin"></div><span>SUNWIN</span></div>
                <div class="game-card" onclick="openKey('LC79', 'toollc79.html')"><div class="game-thumb"><img src="https://i.ibb.co/r2Vq2B8k/IMG-5592.jpg" alt="LC79"></div><span>LC79</span></div>
                <div class="game-card" onclick="openKey('MAX789', 'toolmax789.html')"><div class="game-thumb"><img src="https://i.ibb.co/n8573PZD/IMG-5593.jpg" alt="MAX789"></div><span>MAX789</span></div>
                <div class="game-card" onclick="openKey('XOCDIA88', 'toolxocdia88.html')"><div class="game-thumb"><img src="https://i.ibb.co/JWVpBF4j/IMG-5616.png" alt="xocdia88"></div><span>XOCDIA88</span></div>
                <div class="game-card" onclick="openKey('BETVIP', 'toolbetvip.html')"><div class="game-thumb"><img src="https://i.ibb.co/8DMbjXvT/IMG-4161.png" alt="Betvip"></div><span>BETVIP</span></div>
                <div class="game-card" onclick="openKey('GO88', 'toolgo88.html')"><div class="game-thumb"><img src="https://i.ibb.co/n8573PZD/IMG-5593.jpg" style="filter: brightness(0.6);" alt="GO88"></div><span>GO88</span></div>
            </div>
        </div>

        <div id="key-screen" class="hidden">
            <h3 id="target-game" style="text-align:center; color:#00ff41; margin:20px 0;"></h3>
            <input type="text" id="key-input" placeholder="NHẬP MÃ KEY VIP">
            <button class="btn-submit btn-login" onclick="verifyFinal()">KÍCH HOẠT TOOL</button>
            <button class="btn-submit btn-reg" onclick="backToGame()" style="background:#333; color:#aaa; font-size:13px;">QUAY LẠI</button>
        </div>

        <div id="msg-status"></div>
    </div>

    <div id="bottom-bar" class="bottom-bar hidden">
        <button class="bottom-btn" onclick="showNapTienModal()">💰 NẠP TIỀN</button>
        <button class="bottom-btn" onclick="goToHoso()">👤 HỒ SƠ</button>
        <button class="bottom-btn" onclick="showMuaKeyModal()">🛒 MUA KEY</button>
    </div>

    <a href="https://t.me/toollc79md5" class="tele-float" target="_blank">✈️ GROUP </a>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modal-title" class="modal-title"></h3>
            <div id="modal-body"></div>
            <button id="confirm-btn" class="confirm-btn hidden" onclick="confirmPurchase()">XÁC NHẬN MUA</button>
            <button class="modal-close-btn" onclick="closeModal()">ĐÓNG</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcWdVTthI3G7AhFHJLyUX_WhMpOOyxCtzv4KvmQ1GUkzedlpGEf0qQRTQgzt1lygsm2w/exec";
        let serverData = {};
        let targetPage = "";
        let selectedPackage = null;

        function switchTab(tab) {
            document.getElementById('login-form').classList.toggle('active', tab === 'login');
            document.getElementById('reg-form').classList.toggle('active', tab === 'register');
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-reg').classList.toggle('active', tab === 'register');
        }

        async function handleAuth(type) {
            const msg = document.getElementById('msg-status');
            let payload = { action: type };
            
            if (type === 'login') {
                payload.username = document.getElementById('login-user').value.trim();
                payload.password = document.getElementById('login-pass').value.trim();
            } else {
                payload.username = document.getElementById('reg-user').value.trim();
                payload.password = document.getElementById('reg-pass').value.trim();
                payload.sdt = document.getElementById('reg-sdt').value.trim();
            }

            if (!payload.username || !payload.password) {
                msg.style.color = "#ff4d4d"; 
                msg.innerText = "❌ Vui lòng điền đầy đủ thông tin!";
                return;
            }

            msg.style.color = "#ffbc00"; 
            msg.innerText = "⏳ Đang đăng nhập server...";

            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: "POST", 
                    body: JSON.stringify(payload) 
                });
                const data = await res.json();

                if (data.success) {
                    if (type === 'login') {
                        serverData = data;
                        document.getElementById('balance-amount').innerText = Number(data.balance || 0).toLocaleString('vi-VN');
                        document.getElementById('balance-display').classList.remove('hidden');
                        document.getElementById('bottom-bar').classList.remove('hidden');

                        document.getElementById('auth-screen').classList.add('hidden');
                        document.getElementById('game-screen').classList.remove('hidden');
                        document.getElementById('main-title').innerText = "DANH MỤC GAME";
                        msg.innerText = "";
                    } else {
                        msg.style.color = "#00ff41"; 
                        msg.innerText = "✅ Đăng ký thành công! Hãy đăng nhập.";
                        switchTab('login');
                    }
                } else {
                    msg.style.color = "#ff4d4d"; 
                    msg.innerText = "⚠️ " + (data.message || "Lỗi!");
                }
            } catch (e) {
                msg.style.color = "#ff4d4d"; 
                msg.innerText = "🚫 Lỗi kết nối server!";
            }
        }

        function openKey(name, url) {
            targetPage = url;
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('key-screen').classList.remove('hidden');
            document.getElementById('target-game').innerText = "CỔNG GAME: " + name;
            document.getElementById('main-title').innerText = "XÁC MINH KEY";
        }

        function backToGame() {
            document.getElementById('key-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('main-title').innerText = "DANH MỤC GAME";
        }

        function verifyFinal() {
            const inputKey = document.getElementById('key-input').value.trim();
            const msg = document.getElementById('msg-status');

            if (!inputKey) {
                msg.style.color = "#ff4d4d"; 
                msg.innerText = "❌ Vui lòng nhập Key VIP!";
                return;
            }
            if (!serverData.key || inputKey !== serverData.key || inputKey === "keychoduyet") {
                msg.style.color = "#ff4d4d"; 
                msg.innerText = "❌ KEY KHÔNG ĐÚNG HOẶC CHƯA ĐƯỢC DUYỆT!";
                return;
            }
            if (serverData.expiry && serverData.today && serverData.expiry <= serverData.today) {
                msg.style.color = "#ff4d4d"; 
                msg.innerText = "❌ KEY ĐÃ HẾT HẠN! LIÊN HỆ ADMIN.";
                return;
            }

            msg.style.color = "#00ff41"; 
            msg.innerText = "🚀 XÁC MINH THÀNH CÔNG! ĐANG VÀO TOOL...";
            setTimeout(() => { window.location.href = targetPage; }, 1000);
        }

        function showNapTienModal() {
            const html = `
                <p style="color:#aaa; text-align:center; margin:15px 0 20px;">Nhập số tiền bạn muốn nạp (tối thiểu 10.000đ)</p>
                <input type="number" id="nap-amount-input" placeholder="100000" style="width:100%; padding:16px; background:#222; border:1px solid #555; color:#fff; border-radius:12px; font-size:18px; text-align:center;">
            `;
            document.getElementById('modal-title').innerText = "💰 TẠO MÃ NẠP TIỀN";
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('confirm-btn').classList.remove('hidden');
            document.getElementById('confirm-btn').innerText = "TIẾP TỤC & QUÉT QR";
            document.getElementById('confirm-btn').onclick = goToQRPage;
            document.getElementById('custom-modal').classList.add('active');
        }

        function goToQRPage() {
            const amt = document.getElementById('nap-amount-input').value;
            if (!amt || amt < 10000) {
                alert("❌ Số tiền tối thiểu là 10.000đ!");
                return;
            }
            const username = serverData.username || document.getElementById('login-user').value.trim();
            window.location.href = `qr.html?amount=${amt}&username=${encodeURIComponent(username)}`;
        }

        function showMuaKeyModal() {
            if (!serverData.balance || serverData.balance <= 0) {
                alert("❌ Bạn chưa có số dư. Vui lòng NẠP TIỀN trước khi mua key!");
                return;
            }

            selectedPackage = null;
            const html = `
                <div onclick="selectPackage(this, '1ngay', 20000)" class="package-item"><span class="package-name">Key 1 Ngày</span><span class="package-price">20.000đ</span></div>
                <div onclick="selectPackage(this, '1tuan', 60000)" class="package-item"><span class="package-name">Key 1 Tuần</span><span class="package-price">60.000đ</span></div>
                <div onclick="selectPackage(this, '1thang', 200000)" class="package-item"><span class="package-name">Key 1 Tháng</span><span class="package-price">200.000đ</span></div>
                <div onclick="selectPackage(this, 'vinhvien', 300000)" class="package-item"><span class="package-name">Key Vĩnh Viễn</span><span class="package-price">300.000đ</span></div>
            `;

            document.getElementById('modal-title').innerText = "🛒 CHỌN GÓI KEY VIP";
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('confirm-btn').classList.add('hidden');
            document.getElementById('custom-modal').classList.add('active');
        }

        function selectPackage(element, type, price) {
            document.querySelectorAll('.package-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            selectedPackage = { type, price };
            document.getElementById('confirm-btn').classList.remove('hidden');
            document.getElementById('confirm-btn').innerText = `XÁC NHẬN MUA - ${price.toLocaleString('vi-VN')}đ`;
            document.getElementById('confirm-btn').onclick = confirmPurchase;
        }

        function confirmPurchase() {
            if (!selectedPackage) return;
            if (serverData.balance < selectedPackage.price) {
                alert("❌ Số dư không đủ để mua gói này!");
                return;
            }
            const username = serverData.username || document.getElementById('login-user').value.trim();
            document.getElementById('confirm-btn').innerText = "ĐANG XỬ LÝ...";

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "buy_key", 
                    username: username, 
                    package: selectedPackage.type, 
                    price: selectedPackage.price 
                })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    serverData.balance = data.newBalance || (serverData.balance - selectedPackage.price);
                    document.getElementById('balance-amount').innerText = Number(serverData.balance).toLocaleString('vi-VN');
                    alert("✅ Đã trừ tiền và gửi yêu cầu mua key thành công!\nAdmin sẽ duyệt key trong vài phút.");
                    closeModal();
                } else {
                    alert("❌ " + (data.message || "Lỗi khi gửi yêu cầu"));
                    closeModal();
                }
            })
            .catch(() => {
                alert("❌ Lỗi kết nối server!");
                closeModal();
            });
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.remove('active');
            selectedPackage = null;
        }

        function goToHoso() {
            if (serverData.username) {
                window.location.href = `hoso.html?u=${encodeURIComponent(serverData.username)}`;
            } else {
                alert("Vui lòng đăng nhập lại!");
            }
        }

        // HỘP THƯ (Inbox) - Hiện tại là tĩnh
        function showInboxModal() {
            const html = `
                <h3 style="color:#00ff41; text-align:center; margin-bottom:15px;">📬 HỘP THƯ CỦA BẠN</h3>
                <div style="background:#111; border-radius:12px; padding:15px; max-height:380px; overflow-y:auto; color:#ddd; font-size:14px;">
                    <div style="padding:12px; background:#1f1f1f; border-radius:8px; margin-bottom:10px;">
                        <strong>Tuanx3000</strong><br>
                        <small style="color:#888;">Admin </small><br>
                          <span
style="color:#ffd700">manhx9000 <span>
                    
                    </div>
                </div>
                <p style="text-align:center; color:#666; font-size:13px; margin-top:20px;">Thông báo realtime sẽ được cập nhật sau.</p>
            `;
            document.getElementById('modal-title').innerText = "📬 HỘP THƯ";
            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('confirm-btn').classList.add('hidden');
            document.getElementById('custom-modal').classList.add('active');
        }
    </script>
</body>
</html>
