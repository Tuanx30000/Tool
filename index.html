<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOOL SYSTEM - TUANX3000</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41; 
            --accent: #ff00aa;
            --dark: #080808;
            --glass: rgba(15, 15, 15, 0.85);
            --border: rgba(0, 255, 65, 0.3);
        }

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--dark); 
            color: #fff; 
            font-family: 'Lexend', sans-serif; 
            margin: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .container { 
            width: 90%;
            max-width: 340px; 
            padding: 25px 20px; 
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
        }

        .header { text-align: center; margin-bottom: 20px; }
        .badge { 
            background: linear-gradient(90deg, #008000, var(--primary));
            color: #000; font-weight: 800; font-size: 9px; padding: 3px 12px; border-radius: 50px; 
            display: inline-block; margin-bottom: 10px; text-transform: uppercase;
        }
        h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 1.5px; text-shadow: 0 0 10px var(--primary); }
        
        .notif-bar { 
            background: rgba(255, 0, 170, 0.1); border-left: 4px solid var(--accent); color: var(--accent); 
            padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 11px; font-weight: 700; 
            text-align: center; text-decoration: none; display: block;
        }

        .auth-tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: transparent; border: none; color: #666; font-weight: 700; 
                   cursor: pointer; border-radius: 8px; font-size: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }
        
        .form-group { display: none; }
        .form-group.active { display: block; }
        
        input { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            color: #fff; border-radius: 12px; outline: none; font-size: 14px; text-align: center; margin-bottom: 12px;
        }
        input:focus { border-color: var(--primary); background: rgba(0, 255, 65, 0.05); }
        
        .btn-submit { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: 800; 
            cursor: pointer; font-size: 14px; text-transform: uppercase; transition: 0.3s;
        }
        .btn-login { background: var(--primary); color: #000; }
        .btn-reg { background: transparent; color: #fff; border: 1px solid #444; }

        #msg-status { margin-top: 15px; font-size: 11px; text-align: center; min-height: 20px; font-weight: 600; }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="header">
            <span class="badge">SYSTEM V1.0.5</span>
            <h1>TUANX3000</h1>
        </div>

        <a class="notif-bar" href="https://t.me/tuanx3000" "target="_blank">✈️ TELEGRAM: @TUANX3000</a>

        <div class="auth-tabs">
            <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn" id="tab-reg" onclick="switchTab('register')">REGISTER</button>
        </div>
        
        <div id="login-form" class="form-group active">
            <input type="text" id="login-user" placeholder="Tên tài khoản">
            <input type="password" id="login-pass" placeholder="Mật khẩu">
            <button class="btn-submit btn-login" onclick="handleAuth('login')">VÀO HỆ THỐNG</button>
        </div>
        
        <div id="reg-form" class="form-group">
            <input type="text" id="reg-user" placeholder="Tên tài khoản mới">
            <input type="password" id="reg-pass" placeholder="Mật khẩu (> 4 ký tự)">
            <input type="tel" id="reg-sdt" placeholder="SĐT (9 hoặc 10 số)" maxlength="10">
            <button class="btn-submit btn-reg" onclick="handleAuth('register')">ĐĂNG KÝ NGAY</button>
        </div>

        <div id="msg-status"></div>
    </div>

    <script>
        // === SCRIPT URL MỚI BẠN CUNG CẤP ===
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwoUN8Yucnq9eErwPvmbPtWdvS7qKhJ76F-P98Fw9_CRrY0FUzA1L2T0AoPHdIQZ7NUEA/exec";

        function switchTab(tab) {
            document.getElementById('login-form').classList.toggle('active', tab === 'login');
            document.getElementById('reg-form').classList.toggle('active', tab === 'register');
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-reg').classList.toggle('active', tab === 'register');
            document.getElementById('msg-status').innerText = "";
        }

        async function handleAuth(type) {
            const status = document.getElementById('msg-status');
            let payload = { action: type };

            if (type === 'login') {
                payload.username = document.getElementById('login-user').value.trim();
                payload.password = document.getElementById('login-pass').value.trim();
            } else {
                payload.username = document.getElementById('reg-user').value.trim();
                payload.password = document.getElementById('reg-pass').value.trim();
                payload.sdt = document.getElementById('reg-sdt').value.trim();
            }

            // Validation
            if (!payload.username || !payload.password) {
                status.style.color = "#ff4d4d";
                status.innerText = "❌ Vui lòng điền đầy đủ thông tin!";
                return;
            }
            if (payload.password.length < 5) {
                status.style.color = "#ff4d4d";
                status.innerText = "❌ Mật khẩu phải từ 5 ký tự trở lên!";
                return;
            }
            if (type === 'register' && (payload.sdt.length !== 9 && payload.sdt.length !== 10)) {
                status.style.color = "#ff4d4d";
                status.innerText = "❌ SĐT phải đủ 9 hoặc 10 số!";
                return;
            }

            status.style.color = "#ffbc00";
            status.innerText = "⏳ Đang xử lý...";

            try {
                // Dùng text/plain để tránh CORS preflight (rất hiệu quả với GAS)
                const response = await fetch(SCRIPT_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "text/plain;charset=utf-8" 
                    },
                    body: JSON.stringify(payload)
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    // Nếu không parse được JSON (do no-cors hoặc lỗi)
                    data = { success: true };
                }

                if (data.success === true || data.success === "true") {
                    status.style.color = "#00ff41";
                    
                    if (type === 'login') {
                        localStorage.setItem('tuanx3000_user', payload.username);
                        status.innerText = "✅ Đăng nhập thành công! Đang chuyển...";
                        setTimeout(() => {
                            window.location.href = `main.html?u=${encodeURIComponent(payload.username)}`;
                        }, 800);
                    } else {
                        status.innerText = "✅ Đăng ký thành công! Chuyển sang đăng nhập.";
                        setTimeout(() => switchTab('login'), 1500);
                    }
                } else {
                    status.style.color = "#ff4d4d";
                    status.innerText = "⚠️ " + (data.message || "Tài khoản/mật khẩu không đúng hoặc lỗi server!");
                }
            } catch (error) {
                console.error("Lỗi:", error);
                status.style.color = "#ff4d4d";
                status.innerText = "🚫 Lỗi kết nối! Kiểm tra mạng hoặc thử lại sau.";
            }
        }

        // Background Canvas
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, s: Math.random() * 1.6 });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(0, 255, 65, 0.45)";
            stars.forEach(star => {
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.s, 0, Math.PI * 2);
                ctx.fill();
                star.y += 0.45;
                if (star.y > canvas.height) star.y = 0;
            });
            requestAnimationFrame(drawStars);
        }

        window.onload = () => { initCanvas(); drawStars(); };
        window.onresize = initCanvas;
    </script>
</body>
</html>
