<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MAX789 MASTER PRO • TUANX3000</title>
<style>
/* 
   ============================================================
   GIAO DIỆN CHUẨN GỐC - CYBER NEON STYLE
   ============================================================
*/
html, body { 
  margin:0; padding:0; width:100%; height:100%; overflow:hidden; 
  background:#0a0018; font-family:-apple-system, system-ui, sans-serif; 
}
#game-frame { 
  position:absolute; inset:0; width:100%; height:100%; border:0; z-index:1; 
}

/* Controls */
#m-btn, #back-btn {
  position:fixed; top:15px; width:48px; height:48px;
  background:rgba(107, 33, 168, 0.18); border:1.8px solid #6b21a8;
  border-radius:14px; display:flex; justify-content:center; align-items:center;
  z-index:1000005; cursor:pointer; color:#c4b5fd; font-size:24px; 
  backdrop-filter:blur(12px);
}
#m-btn { right:15px; }
#back-btn { left:15px; font-size:22px; }

#m-panel {
  position:fixed; top:75px; right:15px; width:210px;
  background:rgba(15, 6, 32, 0.97); border:1px solid #5b21b6;
  border-radius:18px; display:none; z-index:1000006; overflow:hidden;
  box-shadow: 0 10px 35px rgba(0,0,0,0.7);
}
.m-opt { 
  color:#d6c3ff; padding:15px; font-size:13px; font-weight:700; 
  cursor:pointer; border-bottom:1px solid #3b0764; transition: 0.3s; 
}
.m-opt.active { background:rgba(107,33,168,0.18); color:#e0d4ff; }

/* RE-ALIGN TOOL ROOT TO ORIGINAL SPECS */
#tool-root {
  position:fixed; left:50%; top:20%; transform:translate(-50%, -50%);
  width:320px; height:172px; border-radius:68px; /* Giữ bo tròn cực đại của bản gốc */
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px; z-index:1000000; touch-action:none;
  background:rgba(16, 8, 36, 0.95); backdrop-filter:blur(22px);
  border:1.9px solid rgba(91, 33, 182, 0.45);
  box-shadow:0 18px 45px rgba(0, 0, 0, 0.75); 
  user-select:none; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.led { width:56px; height:56px; border-radius:50%; transition:0.4s; }
.l-t { background:#1c1233; border:2px solid #6b21a833; }
.l-x { background:#1c1233; border:2px solid #9f123933; }

/* Original Glowing Colors */
.on.l-t { background:#9f7aeb; box-shadow:0 0 14px rgba(159,122,235,0.4); }
.on.l-x { background:#f472b6; box-shadow:0 0 14px rgba(244,114,182,0.35); }

.core { flex:1; text-align:center; padding:0 12px; }
#label { font-size:10.6px; color:#c4b5fd; font-weight:800; letter-spacing:1.5px; margin-bottom:5px; text-transform:uppercase; }
#sid { font-size:14.8px; font-weight:900; color:#b794f4; font-family:monospace; letter-spacing:0.6px; }
#res { font-size:34px; font-weight:900; color:#f1e8ff; margin:6px 0; }
#stt { font-size:10.4px; font-weight:700; letter-spacing:0.5px; transition: 0.3s; }
#extra-info { font-size:9px; color:#d1c4ff; margin-top:5px; }
#ping-box { font-size:8.3px; color:#a89eff; margin-top:6px; font-weight:600; }
</style>
</head>
<body>

<iframe id="game-frame" src="https://play.max789.vin/"></iframe>

<div id="m-btn" onclick="toggleMenu()">☰</div>
<div id="back-btn" onclick="goBack()">←</div>

<div id="m-panel">
  <div class="m-opt" id="o-md5" onclick="setMode('md5')">TX MD5 - LIVE</div>
  <div class="m-opt" id="o-nohu" onclick="setMode('nohu')">TX NỔ HŨ - LIVE</div>
  <div class="m-opt" onclick="resize(1.1)">PHÓNG TO (+)</div>
  <div class="m-opt" onclick="resize(0.9)">THU NHỎ (-)</div>
  <div class="m-opt" style="color:#ffcc00" onclick="location.reload()">LÀM MỚI TOOL</div>
</div>

<div id="tool-root">
  <div id="led-t" class="led l-t"></div>
  <div class="core">
    <div id="label">MAX789 MASTER PRO</div>
    <div id="sid">#CONNECTING</div>
    <div id="res">...</div>
    <div id="stt">ĐANG KHỞI TẠO...</div>
    <div id="extra-info">Winrate: -- | Logic: --</div>
    <div id="ping-box">Ping: --ms | TuanX3000 v20.0</div>
  </div>
  <div id="led-x" class="led l-x"></div>
</div>

<script>
const API_URL = "https://apimax789-production.up.railway.app/api/all";
let currentMode = localStorage.getItem('max789_mode') || 'nohu'; 
let currentScale = parseFloat(localStorage.getItem('max789_scale')) || 1.0;
let abortCtrl = null;

function goBack() { window.history.back(); }

async function refreshData() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  
  const startTime = Date.now();
  try {
    const response = await fetch(API_URL, { signal: abortCtrl.signal });
    const json = await response.json();
    const modeData = json[currentMode];

    if (modeData) {
      updateUI(modeData, Date.now() - startTime);
    }
  } catch (e) {
    if (e.name !== 'AbortError') document.getElementById("stt").innerText = "🔄 ĐANG KẾT NỐI LẠI...";
  }
}

function updateUI(data, ping) {
  // Đồng bộ Phiên và Dự đoán
  document.getElementById("sid").innerText = `#${data.phien}`;
  
  // Xử lý chuỗi dự đoán (Bỏ Rocket nếu có để căn giữa chuẩn)
  const cleanRes = data.du_doan.split(' ')[0].toUpperCase();
  document.getElementById("res").innerText = cleanRes;

  // LED logic chuẩn bản gốc
  const isTai = cleanRes.includes("TÀI");
  document.getElementById("led-t").classList.toggle("on", isTai);
  document.getElementById("led-x").classList.toggle("on", !isTai);

  // Status và Lời khuyên
  const sttEl = document.getElementById("stt");
  sttEl.innerText = `${data.loi_khuyen} (${data.tin_cay})`;
  
  // Đổi màu status theo độ tin cậy của bản gốc
  const confidence = parseInt(data.tin_cay);
  sttEl.style.color = confidence >= 80 ? "#9f7aeb" : "#f472b6";

  // Thông tin bổ sung
  document.getElementById("extra-info").innerText = `Winrate: 94% | Logic: ${data.logic}`;
  document.getElementById("ping-box").innerText = `Ping: ${ping}ms | MAX789 NEURAL CORE`;
}

// UI Functions
function setMode(m) {
  currentMode = m;
  localStorage.setItem('max789_mode', m);
  document.querySelectorAll('.m-opt').forEach(el => el.classList.remove('active'));
  document.getElementById(`o-${m}`).classList.add('active');
  document.getElementById("label").innerText = `MAX789 ${m.toUpperCase()} PRO`;
  if (document.getElementById("m-panel").style.display === "block") toggleMenu();
  refreshData();
}

function toggleMenu() {
  const p = document.getElementById("m-panel");
  p.style.display = p.style.display === "block" ? "none" : "block";
}

function resize(f) {
  currentScale = Math.max(0.6, Math.min(1.5, currentScale * f));
  localStorage.setItem('max789_scale', currentScale);
  document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
}

// Drag & Drop
const el = document.getElementById("tool-root");
let isDrag = false, offset = [0, 0];
const start = (e) => {
  isDrag = true;
  el.style.transition = 'none';
  const c = e.touches ? e.touches[0] : e;
  offset = [c.clientX - el.offsetLeft, c.clientY - el.offsetTop];
};
const move = (e) => {
  if (!isDrag) return;
  const c = e.touches ? e.touches[0] : e;
  el.style.left = (c.clientX - offset[0]) + 'px';
  el.style.top = (c.clientY - offset[1]) + 'px';
};
const end = () => { isDrag = false; el.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; };

el.addEventListener('mousedown', start);
el.addEventListener('touchstart', start, {passive: false});
window.addEventListener('mousemove', move);
window.addEventListener('touchmove', move, {passive: false});
window.addEventListener('mouseup', end);
window.addEventListener('touchend', end);

// Init
document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
setMode(currentMode);
setInterval(refreshData, 3500);
</script>
</body>
</html>
