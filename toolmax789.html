<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>MAX789 MASTER PRO • TUANX3000</title>
<style>
html, body { 
  margin:0; padding:0; width:100%; height:100%; overflow:hidden; 
  background:#000; font-family:-apple-system, system-ui, sans-serif; 
}
#game-frame { 
  position:absolute; inset:0; width:100%; height:100%; border:0; z-index:1; 
}

/* Menu điều khiển */
#m-btn {
  position:fixed; top:15px; right:15px; width:48px; height:48px;
  background:rgba(0,255,255,0.2); border:1.5px solid #00eaff;
  border-radius:14px; display:flex; justify-content:center; align-items:center;
  z-index:1000005; cursor:pointer; color:#00eaff; font-size:24px; 
  backdrop-filter:blur(15px);
}
#m-panel {
  position:fixed; top:75px; right:15px; width:210px;
  background:rgba(10,10,15,0.95); border:1px solid #00eaff;
  border-radius:18px; display:none; z-index:1000006; overflow:hidden;
  box-shadow: 0 15px 50px rgba(0,0,0,0.8);
}
.m-opt { 
  color:#fff; padding:15px; font-size:13px; font-weight:700; 
  cursor:pointer; border-bottom:1px solid #222; transition: 0.3s; 
}
.m-opt:active { background:rgba(0,234,255,0.2); }
.m-opt.active { color:#00eaff; background:rgba(0,234,255,0.1); }

#back-btn {
  position:fixed; top:15px; left:15px; width:48px; height:48px;
  background:rgba(0,234,255,0.18); border:1.5px solid #00eaff;
  border-radius:14px; display:flex; justify-content:center; align-items:center;
  z-index:1000005; cursor:pointer; color:#00eaff; font-size:22px; 
  backdrop-filter:blur(12px); box-shadow:0 4px 15px rgba(0,234,255,0.25);
}

/* Tool chính */
#tool-root {
  position:fixed; left:50%; top:20%; transform:translate(-50%, -50%) scale(1);
  width:320px; height:178px; border-radius:68px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 22px; z-index:1000000; touch-action:none;
  background:rgba(15,15,22,0.88); backdrop-filter:blur(25px);
  border:1.8px solid rgba(0,234,255,0.45);
  box-shadow:0 25px 60px rgba(0,0,0,0.85); 
  user-select:none; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.led { width:58px; height:58px; border-radius:50%; transition:0.4s; }
.l-t { background:#081808; border:2px solid #00ff8811; }
.l-x { background:#180808; border:2px solid #ff335511; }
.on.l-t { background:#00ff88; box-shadow:0 0 50px #00ff88, inset 0 0 15px #fff; transform:scale(1.05); }
.on.l-x { background:#ff3355; box-shadow:0 0 50px #ff3355, inset 0 0 15px #fff; transform:scale(1.05); }

.core { flex:1; text-align:center; padding:0 12px; }
#label { 
  font-size:10px; color:#ffd700; font-weight:900; 
  letter-spacing:1.5px; margin-bottom:4px; text-transform:uppercase; 
}
#sid { 
  font-size:13.5px; font-weight:700; color:#00eaff; 
  font-family:monospace; margin-bottom:4px;
}
#res { 
  font-size:46px; font-weight:900; color:#fff; 
  text-shadow:0 0 22px rgba(255,255,255,0.7); margin:6px 0 8px 0; 
}
#stt { 
  font-size:9.8px; font-weight:800; text-transform:uppercase; 
  letter-spacing:0.6px; line-height:1.4; min-height:28px;
}
#extra-info { 
  font-size:8.8px; color:#aaa; margin-top:4px; line-height:1.35; 
}
#ping-box { 
  font-size:8px; color:#666; margin-top:6px; font-weight:bold; 
}
</style>
</head>
<body>

<iframe id="game-frame" src="https://play.max789.vin/"></iframe>

<div id="m-btn" onclick="toggleMenu()">☰</div>
<div id="back-btn" onclick="goBack()">←</div>

<div id="m-panel">
  <div class="m-opt" id="o-md5" onclick="setMode('md5')">TX MD5 - LIVE</div>
  <div class="m-opt" id="o-nohu" onclick="setMode('nohu')">TX NỔ HŨ - LIVE</div>
  <div class="m-opt" onclick="resize(1.1)">PHÓNG TO (+)</div>
  <div class="m-opt" onclick="resize(0.9)">THU NHỎ (-)</div>
  <div class="m-opt" style="color:#ffcc00" onclick="location.reload()">LÀM MỚI TOOL</div>
</div>

<div id="tool-root">
  <div id="led-t" class="led l-t"></div>
  <div class="core">
    <div id="label">MAX789 MASTER PRO</div>
    <div id="sid">PHIÊN #------</div>
    <div id="res">...</div>
    <div id="stt">ĐANG PHÂN TÍCH...</div>
    <div id="extra-info">Rate: --% | W: -- | L: --</div>
    <div id="ping-box">Ping: --ms | TuanX3000 v2.1</div>
  </div>
  <div id="led-x" class="led l-x"></div>
</div>

<script>
const API_URL = "https://apimax789-production.up.railway.app/api/prediction";

let currentMode = localStorage.getItem('tuanx3000_mode') || 'nohu'; 
let currentScale = parseFloat(localStorage.getItem('tuanx3000_scale')) || 1.0;
let abortCtrl = null;

function goBack() {
    window.location.href = `main.html?u=${encodeURIComponent(currentUser || '')}`;
}

// ================== CẬP NHẬT DỮ LIỆU ==================
async function refreshData() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();
  
  const startTime = Date.now();

  try {
    const response = await fetch(API_URL, { 
      signal: abortCtrl.signal,
      cache: "no-cache"
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const json = await response.json();
    const modeKey = currentMode.toUpperCase();
    const data = json.results[modeKey];

    if (data) {
      renderUI(data, json, Date.now() - startTime);
    } else {
      document.getElementById("stt").innerText = "MODE KHÔNG TÌM THẤY";
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      console.error("Lỗi kết nối:", e);
      document.getElementById("stt").innerText = "🔄 KẾT NỐI LẠI...";
    }
  }
}

function renderUI(data, rootData, ping) {
  // === PHẦN PHIÊN SAU (next_session) ===
  document.getElementById("sid").innerText = `PHIÊN #${data.next_session || '------'}`;

  // === DỰ ĐOÁN CHỈ LẤY KẾT QUẢ THUẦN (TÀI hoặc XỈU) ===
  const predict = (data.predict || '...').toUpperCase();
  document.getElementById("res").innerText = predict;

  // Đèn LED
  const isTai = predict.includes("TÀI");
  const isXiu = predict.includes("XỈU");
  document.getElementById("led-t").classList.toggle("on", isTai);
  document.getElementById("led-x").classList.toggle("on", isXiu);

  // Độ tin cậy
  const confidence = parseInt(data.confidence) || 50;
  const sttEl = document.getElementById("stt");
  sttEl.innerText = `ĐỘ TIN CẬY: ${data.confidence || '---'}`;
  sttEl.style.color = confidence >= 80 ? "#00ff88" : confidence >= 65 ? "#ffd700" : "#ff3355";

  // Win / Loss / Rate
  const acc = data.accuracy || {};
  document.getElementById("extra-info").innerText = 
    `Rate: ${acc.rate || '--'} | W: ${acc.win || 0} | L: ${acc.loss || 0}`;

  // Ping
  document.getElementById("ping-box").innerText = 
    `Ping: ${ping}ms | TuanX3000 v2.1`;
}

// ================== ĐIỀU KHIỂN ==================
function setMode(m) {
  currentMode = m;
  localStorage.setItem('tuanx3000_mode', m);
  
  document.getElementById("o-md5").classList.toggle("active", m === 'md5');
  document.getElementById("o-nohu").classList.toggle("active", m === 'nohu');
  
  document.getElementById("label").innerText = `MAX789 ${m.toUpperCase()} PRO`;
  
  if (document.getElementById("m-panel").style.display === "block") toggleMenu();
  refreshData();
}

function toggleMenu() {
  const panel = document.getElementById("m-panel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function resize(f) {
  currentScale = Math.max(0.6, Math.min(1.5, currentScale * f));
  localStorage.setItem('tuanx3000_scale', currentScale);
  document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
}

// Drag & Drop Tool
const tool = document.getElementById("tool-root");
let isDragging = false, offsetX = 0, offsetY = 0;

tool.addEventListener('mousedown', (e) => {
  isDragging = true;
  offsetX = e.clientX - tool.offsetLeft;
  offsetY = e.clientY - tool.offsetTop;
  tool.style.transition = 'none';
});

tool.addEventListener('touchstart', (e) => {
  isDragging = true;
  const touch = e.touches[0];
  offsetX = touch.clientX - tool.offsetLeft;
  offsetY = touch.clientY - tool.offsetTop;
  tool.style.transition = 'none';
}, {passive: false});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  tool.style.left = (e.clientX - offsetX) + 'px';
  tool.style.top = (e.clientY - offsetY) + 'px';
});

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const touch = e.touches[0];
  tool.style.left = (touch.clientX - offsetX) + 'px';
  tool.style.top = (touch.clientY - offsetY) + 'px';
}, {passive: false});

window.addEventListener('mouseup', () => { 
  isDragging = false; 
  tool.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; 
});
window.addEventListener('touchend', () => { 
  isDragging = false; 
  tool.style.transition = 'transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)'; 
});

// ================== KHỞI TẠO ==================
document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
setMode(currentMode);
setInterval(refreshData, 2800);
refreshData();
</script>
</body>
</html>
