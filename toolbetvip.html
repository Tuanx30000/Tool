<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BETVIP MASTER TOOL • TUANX3000</title>
<style>
html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; font-family:-apple-system, system-ui, sans-serif; }
#game-frame { position:absolute; inset:0; width:100%; height:100%; border:0; z-index:1; }

#m-btn, #back-btn {
  position:fixed; top:15px; width:48px; height:48px;
  background:rgba(0,255,255,0.2); border:1.5px solid #00eaff;
  border-radius:14px; display:flex; justify-content:center; align-items:center;
  z-index:1000005; cursor:pointer; color:#00eaff; font-size:24px; 
  backdrop-filter:blur(15px);
}
#m-btn { right:15px; }
#back-btn { left:15px; font-size:22px; }

#m-panel {
  position:fixed; top:72px; right:15px; width:210px;
  background:rgba(10,10,15,0.95); border:1px solid #00eaff;
  border-radius:18px; display:none; z-index:1000006; overflow:hidden;
  box-shadow: 0 15px 50px rgba(0,0,0,0.8);
}
.m-opt { 
  color:#fff; padding:15px; font-size:13px; font-weight:700; 
  cursor:pointer; border-bottom:1px solid #222; transition: 0.3s; 
}
.m-opt:active { background:rgba(0,234,255,0.2); }
.m-opt.active { color:#00eaff; background:rgba(0,234,255,0.1); }

#tool-root {
  position:fixed; left:50%; top:20%; transform:translate(-50%, -50%) scale(1);
  width:320px; height:158px; border-radius:68px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 22px; z-index:1000000; touch-action:none;
  background:rgba(15,15,22,0.88); backdrop-filter:blur(25px);
  border:1.8px solid rgba(0,234,255,0.45);
  box-shadow:0 25px 60px rgba(0,0,0,0.85); 
  user-select:none;
}
.led { width:58px; height:58px; border-radius:50%; transition:0.4s; }
.l-t { background:#081808; border:2px solid #00ff8811; }
.l-x { background:#180808; border:2px solid #ff335511; }
.on.l-t { background:#00ff88; box-shadow:0 0 50px #00ff88, inset 0 0 15px #fff; transform:scale(1.05); }
.on.l-x { background:#ff3355; box-shadow:0 0 50px #ff3355, inset 0 0 15px #fff; transform:scale(1.05); }

.core { flex:1; text-align:center; padding:0 12px; }
#label { font-size:10px; color:#ffd700; font-weight:900; letter-spacing:1.5px; margin-bottom:4px; text-transform:uppercase; }
#sid { font-size:14px; font-weight:900; color:#00eaff; font-family:monospace; letter-spacing:0.5px; }
#res { font-size:34px; font-weight:900; color:#fff; text-shadow:0 0 15px rgba(255,255,255,0.5); margin:4px 0; }
#stt { font-size:9.5px; font-weight:800; text-transform:uppercase; letter-spacing:0.6px; }
#extra-info { font-size:8.5px; color:#aaa; margin-top:3px; line-height:1.3; }
#ping-box { font-size:8px; color:#666; margin-top:5px; font-weight:bold; }
</style>
</head>
<body>

<iframe id="game-frame" src="https://play.betvip.fit"></iframe>

<div id="m-btn" onclick="toggleMenu()">☰</div>
<div id="back-btn" onclick="goBackToIndex()">←</div>

<div id="m-panel">
  <div class="m-opt" id="o-nohu" onclick="setMode('nohu')">TX NỔ HŨ - LIVE</div>
  <div class="m-opt" id="o-md5" onclick="setMode('md5')">TX MD5 - LIVE</div>
  <div class="m-opt" onclick="resize(1.1)">PHÓNG TO (+)</div>
  <div class="m-opt" onclick="resize(0.9)">THU NHỎ (-)</div>
  <div class="m-opt" style="color:#ffcc00" onclick="location.reload()">LÀM MỚI TOOL</div>
</div>

<div id="tool-root">
  <div id="led-t" class="led l-t"></div>
  <div class="core">
    <div id="label">BETVIP MASTER • TUANX3000</div>
    <div id="sid">#CONNECTING</div>
    <div id="res">...</div>
    <div id="stt">ĐANG KHỞI TẠO AI</div>
    <div id="extra-info">W(--) L(--)</div>
    <div id="ping-box">Ping: --ms | TuanX3000 v7.2</div>
  </div>
  <div id="led-x" class="led l-x"></div>
</div>

<script>
// ================== USER CHECK ==================
const urlParams = new URLSearchParams(window.location.search);
const currentUser = urlParams.get('u') || localStorage.getItem('tuanx3000_user');
if (!currentUser || currentUser === "null") window.location.replace("index.html");

function goBackToIndex() {
  window.location.href = `main.html?u=${encodeURIComponent(currentUser)}`;
}

// ================== CẤU HÌNH ==================
const API_URL = "https://apibetvip-production.up.railway.app";
let currentMode = localStorage.getItem('betvip_mode') || 'nohu';
let currentScale = parseFloat(localStorage.getItem('betvip_scale')) || 1.0;
let abortCtrl = null;

// ================== THUẬT TOÁN LC79 v6.1 (GIỮ NGUYÊN) ==================
function runMasterAI(list) {
  if (!list || list.length < 20) return { result: "TÀI", confidence: 55, streak: "0T", entropy: "0.50" };

  const historyArr = list.slice(0, 400).map(item => {
    let val = item.resultTruyenThong || item.result || item.BetSide || item.betSide || item.diceSum || "";
    if (typeof val === 'number') return (val >= 11 || val === 1) ? "T" : "X";
    const s = String(val).toUpperCase().trim();
    return (s.includes("TÀI") || s.includes("TAI") || s === "T" || s.includes("BIG") || s === "1") ? "T" : "X";
  });

  const history = historyArr.join("");
  const len = history.length;

  let tScore = 0, xScore = 0;

  for (let i = 0; i < Math.min(80, len); i++) {
    const weight = Math.pow(0.965, i);
    const isT = history[i] === "T";

    if (i >= 2 && history.substring(i-2, i+1) === history.substring(0,3)) {
      isT ? tScore += weight * 1.85 : xScore += weight * 1.95;
    }
    if (i >= 4 && history.substring(i-4, i+1) === history.substring(0,5)) {
      isT ? tScore += weight * 2.45 : xScore += weight * 2.65;
    }
    if (i < 12) {
      const recentWeight = Math.pow(1.13, 12 - i);
      isT ? tScore += recentWeight * 0.85 : xScore += recentWeight * 0.9;
    }
  }

  let tt=0, tx=0, xt=0, xx=0, streakT=0, streakX=0, maxStreak=1;
  let currentStreakChar = history[0];

  for (let i = 1; i < len; i++) {
    if (history[i] === "T") {
      if (history[i-1] === "T") { tt++; streakT++; streakX = 0; }
      else { xt++; streakT = 1; streakX = 0; }
      if (streakT > maxStreak) { maxStreak = streakT; currentStreakChar = "T"; }
    } else {
      if (history[i-1] === "X") { xx++; streakX++; streakT = 0; }
      else { tx++; streakX = 1; streakT = 0; }
      if (streakX > maxStreak) { maxStreak = streakX; currentStreakChar = "X"; }
    }
  }

  const pTafterT = tt / (tt + tx + 0.001);
  const pTafterX = xt / (xt + xx + 0.001);
  const overallPT = (tt + xt) / (len - 1 + 0.001);

  let changes = 0;
  for (let i = 1; i < len; i++) if (history[i] !== history[i-1]) changes++;
  const entropy = changes / (len - 1 + 0.001);

  let final = (tScore > xScore * 1.03) ? "TÀI" : "XỈU";

  if (maxStreak >= 6) final = (currentStreakChar === "T") ? "XỈU" : "TÀI";
  else if (maxStreak >= 5) final = (currentStreakChar === "T") ? "XỈU" : "TÀI";

  if (pTafterT > 0.67) final = "TÀI";
  if (pTafterX > 0.68) final = "XỈU";

  if (entropy > 0.52 && Math.abs(tScore - xScore) < 9) {
    final = Math.random() > 0.48 ? "TÀI" : "XỈU";
  }

  let diff = Math.abs(tScore - xScore);
  let conf = 56 + Math.floor(diff * 7.1);

  if (maxStreak >= 5) conf += 15;
  if (Math.max(pTafterT, pTafterX) > 0.66) conf += 13;
  if (len > 60 && entropy < 0.39) conf += 9;

  if (entropy > 0.53) conf = Math.max(55, conf - 16);
  if (Math.abs(overallPT - 0.5) < 0.05) conf = Math.max(55, conf - 13);

  let percent = Math.max(55, Math.min(88, Math.round(conf)));

  let decision = (maxStreak >= 6) ? "BẺ CẦU" : (maxStreak >= 5) ? "BẺ CẦU" : (diff > 18) ? "MẠNH" : "CÂN BẰNG";

  return { result: final, confidence: percent, streak: maxStreak + currentStreakChar, entropy: entropy.toFixed(2), decision };
}

// ================== REFRESH DATA - DÙNG API BETVIP MỚI ==================
async function refreshData() {
  if (abortCtrl) abortCtrl.abort();
  abortCtrl = new AbortController();

  const startTime = Date.now();

  try {
    const res = await fetch(API_URL, { 
      signal: abortCtrl.signal, 
      cache: "no-store" 
    });

    if (!res.ok) throw new Error("API error");

    const json = await res.json();
    const data = json[currentMode];   // Lấy nohu hoặc md5

    if (!data || typeof data.phien_tiep === 'undefined') throw new Error("Invalid data");

    const resultText = data.du_doan.includes("Tài") ? "TÀI" : "XỈU";
    const confidence = parseInt(data.tin_cay) || 60;
    const wins = data.thong_ke?.thang || 0;
    const losses = data.thong_ke?.thua || 0;
    const logicText = data.logic || "CẬP NHẬT";

    const prediction = {
      result: resultText,
      confidence: confidence,
      streak: "--",
      entropy: "0.00",
      decision: logicText   // Dùng logic từ API (Bám cầu, Bẻ cầu...)
    };

    const ping = Date.now() - startTime;

    renderUI(data.phien_tiep, prediction, ping, wins, losses);

  } catch (e) {
    if (e.name !== 'AbortError') {
      console.error("BETVIP API Error:", e);
      document.getElementById("res").innerText = "ERROR";
      document.getElementById("stt").innerText = "KẾT NỐI LỖI";
      document.getElementById("stt").style.color = "#ff5555";
    }
  }
}

// ================== RENDER ==================
function renderUI(sessionId, pred, ping, wins, losses) {
  document.getElementById("sid").innerText = `#${sessionId}`;
  document.getElementById("res").innerText = pred.result;

  document.getElementById("led-t").classList.toggle("on", pred.result === "TÀI");
  document.getElementById("led-x").classList.toggle("on", pred.result === "XỈU");

  const sttEl = document.getElementById("stt");
  sttEl.innerText = pred.decision;   // Hiển thị logic từ API
  sttEl.style.color = pred.decision.includes("Bẻ") || pred.decision.includes("Bẻ cầu") ? "#ffaa00" : 
                     (pred.decision.includes("Bám") ? "#00ff88" : "#ffd700");

  document.getElementById("extra-info").innerText = `W(${wins}) L(${losses})`;
  document.getElementById("ping-box").innerText = `Ping: ${ping}ms | TuanX3000 v7.2`;
}

// ================== MODE & CONTROLS ==================
function setMode(m) {
  currentMode = m;
  localStorage.setItem('betvip_mode', m);
  document.getElementById("o-md5").classList.toggle("active", m === 'md5');
  document.getElementById("o-nohu").classList.toggle("active", m === 'nohu');
  document.getElementById("label").innerText = m === 'md5' ? 'BETVIP MD5 ACTIVE' : 'BETVIP NỔ HŨ ACTIVE';
  toggleMenu();
  refreshData();
}

function toggleMenu() {
  const p = document.getElementById("m-panel");
  p.style.display = (p.style.display === "block") ? "none" : "block";
}

function resize(f) {
  currentScale = Math.max(0.6, Math.min(1.5, currentScale * f));
  localStorage.setItem('betvip_scale', currentScale);
  document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
}

// Drag & Touch
const el = document.getElementById("tool-root");
let isDrag = false, offset = [0, 0];

const startDrag = (e) => {
  isDrag = true;
  el.style.transition = 'none';
  const c = e.touches ? e.touches[0] : e;
  offset = [c.clientX - el.offsetLeft, c.clientY - el.offsetTop];
};

const moveDrag = (e) => {
  if (!isDrag) return;
  const c = e.touches ? e.touches[0] : e;
  el.style.left = (c.clientX - offset[0]) + 'px';
  el.style.top = (c.clientY - offset[1]) + 'px';
};

el.addEventListener('mousedown', startDrag);
el.addEventListener('touchstart', startDrag, {passive: false});
window.addEventListener('mousemove', moveDrag);
window.addEventListener('touchmove', moveDrag, {passive: false});
window.addEventListener('mouseup', () => { isDrag = false; el.style.transition = 'transform 0.3s'; });
window.addEventListener('touchend', () => { isDrag = false; });

// ================== KHỞI CHẠY ==================
document.getElementById("tool-root").style.transform = `translate(-50%, -50%) scale(${currentScale})`;
setMode(currentMode);
setInterval(refreshData, 3200);
refreshData();
</script>
</body>
</html>
