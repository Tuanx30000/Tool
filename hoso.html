<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ - TUANX3000</title>
    <style>
        body { 
            background: #050505; 
            color: #fff; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        .profile-card { 
            background: #111; 
            border: 2px solid #00ff41; 
            border-radius: 20px; 
            padding: 25px; 
            max-width: 420px; 
            margin: 0 auto; 
            box-shadow: 0 0 30px rgba(0,255,65,0.3); 
        }
        .avatar { 
            width: 90px; 
            height: 90px; 
            background: #222; 
            border-radius: 50%; 
            border: 3px solid #00ff41; 
            margin: 0 auto 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 45px; 
            box-shadow: 0 0 20px rgba(0,255,65,0.4);
        }
        h3 { 
            text-align:center; 
            color:#00ff41; 
            margin-bottom:25px; 
            font-size:24px; 
        }
        .info-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 14px 0; 
            border-bottom: 1px solid #222; 
            font-size: 15px; 
        }
        .label { 
            color: #888; 
            font-weight: 500; 
        }
        .value { 
            color: #00ff41; 
            font-weight: bold; 
        }
        .btn-back { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(90deg, #333, #555); 
            color: #fff; 
            border: none; 
            border-radius: 12px; 
            margin-top: 30px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            transition: 0.3s;
        }
        .btn-back:active { 
            transform: scale(0.97); 
        }
        .note {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">👤</div>
        <h3>THÔNG TIN TÀI KHOẢN</h3>
        
        <div class="info-row"><span class="label">Tên tài khoản:</span><span class="value" id="h-user">Đang tải...</span></div>
        <div class="info-row"><span class="label">Số điện thoại:</span><span class="value" id="h-sdt">Đang tải...</span></div>
        <div class="info-row"><span class="label">Số dư hiện tại:</span><span class="value" id="h-balance">0đ</span></div>
        <div class="info-row"><span class="label">Mã Key VIP:</span><span class="value" id="h-key">Đang tải...</span></div>
        <div class="info-row"><span class="label">Ngày hết hạn:</span><span class="value" id="h-exp">Đang tải...</span></div>

        <button class="btn-back" onclick="window.location.href='index.html'">🔙 QUAY LẠI TRANG CHỦ</button>
        
        <div class="note">
            Nếu Key chưa active hoặc hết hạn, vui lòng liên hệ Admin @Tuanx3000
        </div>
    </div>

    <script>
        // SCRIPT_URL MỚI (đã update theo yêu cầu của bạn)
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcWdVTthI3G7AhFHJLyUX_WhMpOOyxCtzv4KvmQ1GUkzedlpGEf0qQRTQgzt1lygsm2w/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get("u");

        async function loadProfile() {
            if (!username) {
                document.getElementById('h-user').innerText = "Lỗi: Không có username";
                return;
            }

            try {
                const res = await fetch(SCRIPT_URL + "?action=get_info&username=" + encodeURIComponent(username));
                const data = await res.json();

                if (data.success) {
                    document.getElementById('h-user').innerText = data.username;
                    document.getElementById('h-sdt').innerText = data.sdt || "Chưa cập nhật";
                    document.getElementById('h-balance').innerText = Number(data.balance || 0).toLocaleString('vi-VN') + "đ";
                    document.getElementById('h-key').innerText = data.key || "Chưa có key";
                    document.getElementById('h-exp').innerText = data.expiry || "2000-01-01";
                } else {
                    document.getElementById('h-user').innerText = "Không tìm thấy tài khoản";
                }
            } catch (e) {
                console.error(e);
                alert("Lỗi kết nối server. Vui lòng thử lại sau.");
            }
        }

        // Tự động load khi mở trang
        window.onload = loadProfile;
    </script>
</body>
</html>
