<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỒ SƠ - TUANX3000</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff41;
            --accent: #ff00aa;
            --danger: #ff4d4d;
            --warning: #ffae00;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Lexend', sans-serif; 
            margin: 0; padding: 0;
            display: flex; align-items: center; justify-content: center;
            height: 100dvh;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f0f1a 0%, #000 100%);
        }

        /* Nền mờ ảo phía sau */
        body::before {
            content: ""; position: fixed; top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(0, 255, 65, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .profile-card { 
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px; 
            padding: 30px; 
            width: 92%;
            max-width: 400px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-wrap { 
            position: relative; width: 90px; height: 90px; margin: 0 auto 20px;
        }
        .avatar { 
            width: 100%; height: 100%; 
            background: var(--bg); border-radius: 50%; 
            border: 2px solid var(--primary); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 40px; box-shadow: 0 0 20px rgba(0,255,65,0.2);
        }
        .status-dot {
            position: absolute; bottom: 5px; right: 5px;
            width: 18px; height: 18px; background: var(--primary);
            border-radius: 50%; border: 3px solid #111;
        }

        h3 { text-align:center; color:#fff; margin: 0 0 5px 0; font-size: 20px; font-weight: 800; }
        .sub-title { text-align: center; color: var(--primary); font-size: 11px; letter-spacing: 2px; margin-bottom: 25px; opacity: 0.8; }

        .info-container { background: var(--glass); border-radius: 20px; padding: 5px 18px; border: 1px solid var(--border); }
        .info-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); font-size: 14px; align-items: center; }
        .info-row:last-child { border-bottom: none; }
        
        .label { color: #888; font-weight: 400; }
        .value { color: #fff; font-weight: 600; text-align: right; }
        
        /* Hiệu ứng nhấp nháy khi đang tải */
        .loading { color: #444 !important; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        .btn-group { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; }
        
        .btn {
            width: 100%; padding: 16px; border-radius: 16px; font-family: inherit;
            font-size: 14px; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s ease; border: none;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-home { 
            background: var(--primary); color: #000;
            box-shadow: 0 10px 20px rgba(0, 255, 65, 0.2);
        }
        .btn-home:active { transform: scale(0.95); box-shadow: none; }

        .btn-logout { 
            background: rgba(255, 77, 77, 0.1); color: var(--danger);
            border: 1px solid rgba(255, 77, 77, 0.2);
        }
        .btn-logout:active { background: var(--danger); color: #fff; }

        .note { text-align: center; color: #444; font-size: 11px; margin-top: 20px; }
        .note b { color: #666; }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-wrap">
            <div class="avatar">👤</div>
            <div class="status-dot"></div>
        </div>
        <h3>TÀI KHOẢN</h3>
        <div class="sub-title">THÔNG TIN KEY VIP</div>
        
        <div class="info-container">
            <div class="info-row">
                <span class="label">ID:</span>
                <span class="value loading" id="h-user">Đang tải...</span>
            </div>
            <div class="info-row">
                <span class="label">Liên hệ:</span>
                <span class="value loading" id="h-sdt">...</span>
            </div>
            <div class="info-row">
                <span class="label">Ví tiền:</span>
                <span class="value" style="color: #ffd700;" id="h-balance">0đ</span>
            </div>
            <div class="info-row">
                <span class="label">Mã Key:</span>
                <span class="value" id="h-key">...</span>
            </div>
            <div class="info-row">
                <span class="label">Hạn dùng:</span>
                <span class="value" id="h-exp">...</span>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-home" onclick="goHome()">🏠 Về trang chủ</button>
            <button class="btn btn-logout" onclick="logout()">🚪 Đăng xuất</button>
        </div>
        
        <div class="note">Version 1.0.5 Pro | Support: <b>@Tuanx3000</b></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwcWdVTthI3G7AhFHJLyUX_WhMpOOyxCtzv4KvmQ1GUkzedlpGEf0qQRTQgzt1lygsm2w/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get("u");

        async function loadProfile() {
            if (!username) {
                window.location.replace('index.html');
                return;
            }
            try {
                const res = await fetch(`${SCRIPT_URL}?action=get_info&username=${encodeURIComponent(username)}`);
                const data = await res.json();
                
                // Xóa hiệu ứng loading
                document.querySelectorAll('.value').forEach(el => el.classList.remove('loading'));

                if (data.success) {
                    document.getElementById('h-user').innerText = data.username.toUpperCase();
                    document.getElementById('h-sdt').innerText = data.sdt || "Chưa cập nhật";
                    document.getElementById('h-balance').innerText = Number(data.balance || 0).toLocaleString('vi-VN') + "đ";
                    
                    const keyEl = document.getElementById('h-key');
                    if (!data.key || data.key === "") {
                        keyEl.innerText = "CHƯA CÓ KEY";
                        keyEl.style.color = "#ff4d4d";
                    } else if (data.key === "keychoduyet") {
                        keyEl.innerText = "CHỜ DUYỆT";
                        keyEl.style.color = "#ffae00";
                    } else {
                        keyEl.innerText = data.key;
                        keyEl.style.color = "#00ff41";
                    }
                    
                    document.getElementById('h-exp').innerText = data.expiry || "Vĩnh viễn";
                }
            } catch (e) { 
                console.error(e); 
                document.getElementById('h-user').innerText = "LỖI KẾT NỐI";
            }
        }

        function goHome() {
            window.location.href = `main.html?u=${encodeURIComponent(username)}`;
        }

        function logout() {
            if (confirm("Anh Tuấn có chắc muốn đăng xuất?")) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.replace('index.html');
            }
        }

        window.onload = loadProfile;
    </script>
</body>
</html>
